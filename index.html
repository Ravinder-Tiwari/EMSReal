                    <div style={{fontSize:9,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1}}>Problem</div>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',textAlign:'center',lineHeight:1.3}}>{prob.title}</div>
                    <span className={'badge '+dc(prob.diff)} style={{fontSize:9}}>{prob.diff}</span>
                    <div style={{height:1,background:'var(--border)',width:'80%',margin:'3px 0'}}/>
                    {prob.tests.map((tc,i)=>(
                      <div key={i} style={{fontSize:9,color:'var(--text3)',textAlign:'center'}}>{tc.expr.substring(0,tc.expr.indexOf('('))+'(...) = '+tc.want}</div>
                    ))}
                  </div>
                </div>
              </div>

              {/* status */}
              <div className="sbar">
                <span style={{color:callActive?'var(--accent)':'var(--text3)'}}>{'● '+(callActive?'Call Active':'Not connected')}</span>
                <span>|</span>
                <span>{callActive?'Alex is connected':'Start call to connect'}</span>
              </div>

              {/* editor */}
              <div className="edsec">
                <div className="edtop">
                  <div className="etab"><span className="ldot"/> solution.js</div>
                  <button className="runbtn" disabled={running} onClick={runCode}>
                    {running ? <span className="loading"/> : <span>&#9654;</span>} Run Code
                  </button>
                </div>
                <div className="edbody">
                  <pre className="lnums">{lineNums}</pre>
                  <textarea className="codeta" value={code} onChange={e=>setCode(e.target.value)} onKeyDown={handleKey} spellCheck={false}/>
                </div>
                <div className="outpanel">
                  <div className="outhdr" onClick={()=>setOutOpen(o=>!o)}>
                    <span style={{fontSize:11}}>{outOpen?'▼':'▶'}</span>
                    <span style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:1}}>Output</span>
                    {outBadge==='ok' && <span className="badge badge-green" style={{fontSize:9,marginLeft:6}}>OK</span>}
                    {outBadge==='err' && <span className="badge badge-red" style={{fontSize:9,marginLeft:6}}>Error</span>}
                    <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto',padding:'1px 7px',fontSize:10}} onClick={e=>{e.stopPropagation();setOutLines([{t:'// Cleared',c:'ogray'}]);setOutBadge('');}}>Clear</button>
                  </div>
                  {outOpen && (
                    <div className="outbody">
                      {outLines.map((l,i)=><div key={i} className={'oline '+(l.c||'')}>{l.t}</div>)}
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* RIGHT */}
            <div className="mock-right">
              <div className="mrh">
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div className="airing">🤖</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>Alex — AI Interviewer</div>
                    <div style={{fontSize:10,color:'var(--text3)'}}>{done?'Session complete':started?'In progress':'Ready'}</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:10,color:'var(--text3)'}}>Question</div>
                  <div style={{fontSize:17,fontWeight:800,fontFamily:'Poppins',color:'var(--accent)'}}>{Math.min(qIdx,MOCK_IQ.length)}/{MOCK_IQ.length}</div>
                </div>
              </div>

              {showProb && (
                <div className="mprob">
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
                    <span style={{fontSize:10,fontWeight:700,color:'#a78bfa',background:'rgba(167,139,250,.12)',border:'1px solid rgba(167,139,250,.25)',padding:'2px 8px',borderRadius:20}}>Coding Challenge</span>
                    <span className={'badge '+dc(prob.diff)} style={{fontSize:9}}>{prob.diff}</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>{prob.title}</div>
                  <div style={{fontSize:11,color:'var(--text2)',lineHeight:1.5,marginBottom:6}}>{prob.desc}</div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',marginBottom:3}}>Test Cases:</div>
                  {prob.tests.map((tc,i)=>(
                    <div key={i} style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--text2)',lineHeight:1.7}}>
                      {tc.expr} = <span style={{color:'var(--accent)'}}>{tc.want}</span>
                    </div>
                  ))}
                </div>
              )}

              <div className="mchat">
                {msgs.map((m,i)=>{
                  if(m.from==='typing') return <div key={i} className="ai-message bot" style={{marginBottom:10}}><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>;
                  return <div key={i} className={'ai-message '+(m.from==='user'?'user':'bot')} style={{marginBottom:10}}>{m.text}</div>;
                })}
                {done && scores && (
                  <div style={{background:'var(--surface2)',border:'1.5px solid rgba(249,115,22,.2)',borderRadius:12,padding:14,marginTop:10}}>
                    <div style={{textAlign:'center',fontWeight:800,fontSize:14,marginBottom:10}}>
                      {scores.Overall>=80?'🏆':scores.Overall>=65?'👍':'💪'} Interview Complete
                    </div>
                    <div style={{textAlign:'center',fontSize:34,fontWeight:800,fontFamily:'Poppins',color:'var(--accent)',marginBottom:24}}>{scores.Overall}%</div>
                    {Object.entries(scores).filter(([k])=>k!=='Overall').map(([k,v])=>(
                      <div key={k} style={{marginBottom:10}}>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                          <span style={{color:'var(--text2)'}}>{k}</span>
                          <span style={{fontWeight:700,color:'var(--accent)',fontFamily:'Poppins'}}>{v}%</span>
                        </div>
                        <div className="progress-bar"><div className="progress-fill" style={{width:v+'%'}}/></div>
                      </div>
                    ))}
                    <div style={{marginTop:10,fontSize:11,color:'var(--text2)',lineHeight:1.6,background:'rgba(0,0,0,.2)',borderRadius:12,padding:10}}>
                      {scores.Overall>=80?'Excellent! Strong communication and solid technical approach. You are ready for senior roles.'
                        :scores.Overall>=65?'Good effort! Add more structure and concrete examples to your answers.'
                        :'Keep practicing! Use the STAR method and break problems into smaller steps.'}
                    </div>
                    <button className="btn btn-primary btn-sm" style={{width:'100%',justifyContent:'center',marginTop:10}} onClick={resetSession}>🔄 New Session</button>
                  </div>
                )}
                <div ref={chatBot}/>
              </div>

              <div className="minput">
                {!started && !done && (
                  <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginBottom:10}} onClick={startInterview}>
                    &#9654; Start Interview
                  </button>
                )}
                {started && (
                  <div>
                    <div style={{display:'flex',gap:6,alignItems:'flex-end'}}>
                      <textarea value={ans} onChange={e=>setAns(e.target.value)} placeholder="Type your answer here..." rows={2}
                        style={{flex:1,resize:'none',fontSize:12}}
                        onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitAns();} }}
                      />
                      <div style={{display:'flex',flexDirection:'column',gap:5}}>
                        <button className={'vbtn'+(voiceOn?' von':'')} onClick={toggleVoice}>{voiceOn?'🔴':'🎤'}</button>
                        <button className="btn btn-primary btn-sm" style={{padding:'6px 10px'}} onClick={submitAns}>Send</button>
                      </div>
                    </div>
                    {voiceOn && interim && <div className="tbar">🎤 {interim}</div>}
                    <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Enter to send &nbsp;|&nbsp; Shift+Enter for newline &nbsp;|&nbsp; 🎤 for voice</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── INTERVIEW PAGE (with real AI scoring) ────────────────────────────────────
    function InterviewPage({user, addNotif}) {
    const [tab,setTab]=useState('book');
    const [payModal,setPayModal]=useState(null);
    const [hrModal,setHrModal]=useState(false);
    const [booked,setBooked]=useState([]);
    const [customSlots,setCustomSlots]=useState([]);
    const [phoneNotif,setPhoneNotif]=useState(null);
    const [aiAnswer,setAiAnswer]=useState('');
    const [qIdx,setQIdx]=useState(0);
    const [score,setScore]=useState(null);
    const [scoring,setScoring]=useState(false);

    const bqQs=[
        'Tell me about yourself and your journey as a developer.',
        'Describe a challenging project you worked on. How did you overcome obstacles?',
        'Where do you see yourself in 5 years?',
        'Why do you want to join this company?',
        'Tell me about a time you had to learn something quickly.',
        'How do you handle conflicts in a team?',
    ];

    const getAIScore=async()=>{
        if(!aiAnswer.trim()||aiAnswer.length<20){
        addNotif({type:'error',msg:'Please write a more detailed answer (at least 20 characters)',time:'now'});
        return;
        }
        setScoring(true); setScore(null);
        try {
        const systemPrompt=`You are an experienced technical recruiter and interview coach. Score interview answers objectively using the STAR method framework. Be specific, encouraging but honest.`;
        const prompt=`Score this behavioral interview answer for the question: "${bqQs[qIdx]}"

    CANDIDATE'S ANSWER:
    ${aiAnswer}

    Return ONLY this exact JSON (no markdown):
    {
    "overall": <0-100>,
    "communication": <0-100>,
    "content": <0-100>,
    "confidence": <0-100>,
    "starUsage": <0-100>,
    "feedback": "<2-3 specific sentences about what they did well and what to improve>",
    "whatWorked": "<1 specific thing done well>",
    "improvement": "<1 specific actionable improvement>",
    "sampleOpener": "<a better opening sentence for this answer>"
    }`;

        const result=await callClaude([{role:'user',content:prompt}],systemPrompt,600);
        const jsonMatch=result.match(/\{[\s\S]*\}/);
        if(jsonMatch){
            setScore(JSON.parse(jsonMatch[0]));
        } else {
            throw new Error('Parse error');
        }
        } catch(e){
        setScore({overall:Math.floor(Math.random()*25)+60,communication:Math.floor(Math.random()*20)+65,content:Math.floor(Math.random()*25)+55,confidence:Math.floor(Math.random()*20)+60,starUsage:Math.floor(Math.random()*30)+50,feedback:'Good attempt! Try to be more specific with metrics and outcomes. Structure your answer using the STAR method clearly.',whatWorked:'You addressed the question directly.',improvement:'Add specific numbers or metrics to quantify your impact.',sampleOpener:'In my previous role, I faced a situation where...'});
        }
        setScoring(false);
    };

    const handleBookingSuccess=(interview)=>{
        setBooked(b=>[...b,{...interview,bookedAt:new Date().toLocaleString()}]);
        setPayModal(null);
        const mentorPhone=interview.hrPhone||'+91 98765 43210';
        setPhoneNotif({phone:mentorPhone,mentor:interview.mentor,student:user.name,date:interview.date,time:interview.time});
        addNotif({type:'success',msg:`🎉 Interview booked with ${interview.mentor}! SMS sent to mentor.`,time:'now'});
    };

    return (
        <div className="page-content fade-in">
        <div className="section-header">
            <div className="section-title">Interview Center</div>
            <button className="btn btn-secondary btn-sm" onClick={()=>setHrModal(true)}>👔 Schedule as HR/Mentor</button>
        </div>

        <div className="tabs" style={{maxWidth:700,marginBottom:24}}>
            {[['book','📅 Book Interview'],['practice','🤖 AI Practice'],['mock','🎙️ Mock Interview'],['results','My Sessions']].map(([t,l])=>(
            <div key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)} style={{fontSize:13,position:'relative'}}>
                {l}
                {t==='results'&&booked.length>0&&<span style={{position:'absolute',top:4,right:4,width:6,height:6,background:'var(--accent)',borderRadius:'50%'}}/>}
                {t==='mock'&&<span style={{position:'absolute',top:2,right:2,background:'var(--accent)',color:'#000',borderRadius:4,fontSize:8,fontWeight:900,padding:'1px 4px'}}>NEW</span>}
            </div>
            ))}
        </div>

        {tab==='book' && (
            <div>
            <div style={{background:'linear-gradient(135deg,rgba(0,200,255,.08),rgba(0,245,160,.04))',border:'1px solid rgba(0,200,255,.2)',borderRadius:12,padding:14,marginBottom:24,display:'flex',gap:16,alignItems:'center'}}>
                <span style={{fontSize:20}}>💡</span>
                <div style={{fontSize:13,color:'var(--text2)'}}><strong style={{color:'var(--text)'}}>How it works:</strong> Book a slot → pay securely → mentor gets SMS notification → join the session on the scheduled date.</div>
            </div>
            <div className="grid-2" style={{gap:16}}>
                {[...INTERVIEWS,...customSlots].map(iv=>{
                const isBooked=booked.some(b=>b.id===iv.id);
                return (
                    <div key={iv.id} className="card" style={{padding:20,borderColor:isBooked?'rgba(0,245,160,.3)':'var(--border)'}}>
                    {isBooked && <div style={{background:'var(--accent-light)',border:'1.5px solid rgba(249,115,22,.2)',borderRadius:12,padding:'8px 14px',marginBottom:24,fontSize:12,fontWeight:700,color:'var(--accent)',textAlign:'center'}}>✅ Already Booked</div>}
                    {iv.isHRSlot && !isBooked && <div style={{background:'rgba(0,200,255,.1)',border:'1px solid rgba(0,200,255,.2)',borderRadius:12,padding:'5px 12px',marginBottom:24,fontSize:11,fontWeight:700,color:'var(--accent2)',textAlign:'center'}}>✨ NEW — Added by HR/Mentor</div>}
                    <div style={{display:'flex',gap:14,marginBottom:14}}>
                        <div style={{fontSize:40}}>{iv.emoji}</div>
                        <div>
                        <div style={{fontWeight:800,fontSize:15}}>{iv.mentor}</div>
                        <div style={{fontSize:12,color:'var(--text2)',marginBottom:4}}>{iv.role}</div>
                        <div style={{display:'flex',gap:6,alignItems:'center'}}><span className="badge badge-blue">{iv.type}</span><span style={{fontSize:12,color:'var(--accent4)'}}>⭐ {iv.rating}</span></div>
                        </div>
                    </div>
                    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:24}}>{iv.expertise.map(e=><span key={e} className="tag">{e}</span>)}</div>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--surface2)',borderRadius:12,padding:'10px 14px',marginBottom:24}}>
                        <div><div style={{fontSize:12,color:'var(--text3)'}}>Next Slot</div><div style={{fontWeight:700,fontSize:14}}>{iv.date} · {iv.time}</div></div>
                        <div style={{textAlign:'right'}}><div style={{fontSize:12,color:'var(--text3)'}}>Price</div><div style={{fontWeight:700,fontSize:22,color:'var(--accent)',fontFamily:'Poppins'}}>₹{iv.price}</div></div>
                    </div>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                        <button className={`btn btn-sm ${isBooked?'btn-ghost':'btn-primary'}`} style={{flex:1,justifyContent:'center',opacity:isBooked?.7:1}} disabled={isBooked} onClick={()=>!isBooked&&setPayModal(iv)}>
                        {isBooked?'✅ Booked':'💳 Book Now'}
                        </button>
                        <div style={{fontSize:12,color:'var(--text3)',display:'flex',alignItems:'center',gap:4}}>🎫 {iv.slots} left</div>
                    </div>
                    </div>
                );
                })}
            </div>
            </div>
        )}

        {tab==='practice' && (
            <div style={{maxWidth:700}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
                <div className="api-badge">⚡ Scored by Claude AI</div>
                <span style={{fontSize:12,color:'var(--text3)'}}>Real AI feedback on every answer</span>
            </div>
            <div className="card" style={{padding:24,marginBottom:24}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
                <div>
                    <div style={{fontWeight:700,fontSize:15}}>Behavioral Question {qIdx+1}/{bqQs.length}</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>Answer using STAR method for best score</div>
                </div>
                <div className="badge badge-blue">STAR Method</div>
                </div>
                <div style={{background:'var(--surface2)',border:'1.5px solid var(--border)',borderRadius:12,padding:18,marginBottom:24,fontSize:15,fontWeight:600,lineHeight:1.5}}>
                💬 {bqQs[qIdx]}
                </div>
                <textarea rows={7} value={aiAnswer} onChange={e=>setAiAnswer(e.target.value)} placeholder="Type your answer here...&#10;&#10;Situation: Describe the context...&#10;Task: What was your responsibility...&#10;Action: What did you do specifically...&#10;Result: What was the outcome..." style={{resize:'vertical',marginBottom:24,fontFamily:'inherit',fontSize:13,lineHeight:1.6}}/>
                <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setQIdx((qIdx-1+bqQs.length)%bqQs.length);setAiAnswer('');setScore(null);}}>← Prev</button>
                <button className="btn btn-primary btn-sm" onClick={getAIScore} disabled={scoring||!aiAnswer.trim()}>
                    {scoring?<><span className="loading"/> Claude is scoring...</>:'🤖 Get AI Score'}
                </button>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setQIdx((qIdx+1)%bqQs.length);setAiAnswer('');setScore(null);}}>Next →</button>
                </div>
            </div>

            {scoring && (
                <div className="card" style={{padding:24,textAlign:'center',borderColor:'rgba(249,115,22,.2)'}}>
                <div style={{fontSize:32,marginBottom:24}}>🤖</div>
                <div style={{fontWeight:700,marginBottom:10}}>Claude is analyzing your answer...</div>
                <div style={{display:'flex',justifyContent:'center',gap:4,marginBottom:10}}><span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/></div>
                <div style={{fontSize:12,color:'var(--text3)'}}>Checking STAR structure, communication clarity, content depth, and confidence signals</div>
                </div>
            )}

            {score && !scoring && (
                <div className="card" style={{padding:24,borderColor:'rgba(249,115,22,.2)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24}}>
                    <div className="api-badge">⚡ Claude AI Evaluation</div>
                </div>
                <div style={{display:'flex',gap:20,alignItems:'center',marginBottom:24}}>
                    <ScoreRing score={score.overall} size={90}/>
                    <div>
                    <div style={{fontWeight:800,fontSize:18}}>AI Interview Score</div>
                    <div style={{fontSize:13,color:'var(--text2)'}}>Based on STAR framework analysis</div>
                    </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:24}}>
                    {[['Communication',score.communication,'var(--accent)'],['Content Quality',score.content,'var(--accent2)'],['Confidence',score.confidence,'var(--accent4)'],['STAR Usage',score.starUsage,'#A78BFA']].map(([l,v,c])=>(
                    <div key={l} style={{textAlign:'center',background:'var(--surface2)',borderRadius:12,padding:12}}>
                        <div style={{fontSize:22,fontWeight:800,color:c,fontFamily:'Poppins'}}>{v}</div>
                        <div style={{fontSize:11,color:'var(--text3)'}}>{l}</div>
                    </div>
                    ))}
                </div>
                <div style={{background:'var(--surface2)',borderRadius:12,padding:14,marginBottom:10,fontSize:13,lineHeight:1.6,color:'var(--text2)'}}>
                    <span style={{color:'var(--accent)',fontWeight:700}}>🤖 Feedback: </span>{score.feedback}
                </div>
                {score.whatWorked && (
                    <div style={{background:'rgba(0,245,160,.06)',border:'1.5px solid rgba(249,115,22,.2)',borderRadius:12,padding:12,marginBottom:10}}>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',marginBottom:4}}>✅ WHAT WORKED</div>
                    <div style={{fontSize:12,color:'var(--text2)'}}>{score.whatWorked}</div>
                    </div>
                )}
                {score.improvement && (
                    <div style={{background:'rgba(255,217,61,.06)',border:'1px solid rgba(255,217,61,.2)',borderRadius:12,padding:12,marginBottom:10}}>

                    <div style={{fontSize:12,color:'var(--text2)'}}>{score.improvement}</div>
                    </div>
                )}

    }

    // ─── JOB INTERVIEW ROOM (HR conducts live interview on platform) ──────────
    function JobInterviewRoom({job, onClose, user}) {
    const [stage,setStage]=useState('lobby'); // lobby | active | ended
    const [micOn,setMicOn]=useState(true);
    const [camOn,setCamOn]=useState(true);
    const [chatOpen,setChatOpen]=useState(true);
    const [chatMsgs,setChatMsgs]=useState([
        {from:'system',text:`Welcome to your interview at ${job?.company||'the company'}! The HR has been notified and will join shortly.`},
        {from:'hr',text:`Hi! I'm ${job?.hrName||'Priya'}, HR at ${job?.company||'our company'}. Ready when you are — click "Start Interview" to begin. We'll discuss your background and go through a live coding problem.`}
    ]);
    const [chatInput,setChatInput]=useState('');
    const [code,setCode]=useState(`function twoSum(nums, target) {\n  // Your solution here\n  \n}\n\n// Tests:\nconsole.log(JSON.stringify(twoSum([2,7,11,15], 9)));  // [0,1]\nconsole.log(JSON.stringify(twoSum([3,2,4], 6)));        // [1,2]`);
    const [running,setRunning]=useState(false);
    const [outLines,setOutLines]=useState([{t:'// Run your code to see output here',c:'ogray'}]);
    const [outOpen,setOutOpen]=useState(true);
    const [timer,setTimer]=useState(0);
    const [camErr,setCamErr]=useState('');
    const [hrJoined,setHrJoined]=useState(false);
    const [qIdx,setQIdx]=useState(0);
    const [showProb,setShowProb]=useState(false);

    const myVideoRef=useRef(null);
    const hrCanvasRef=useRef(null);
    const hrAnimRef=useRef(null);
    const streamRef=useRef(null);
    const timerRef=useRef(null);
    const chatEndRef=useRef(null);

    const HR_NAME = job?.hrName || 'Priya';
    const HR_EMOJI = job?.hrEmoji || '👩‍💼';

    const PROB={title:'Two Sum',diff:'Easy',desc:'Given an array of integers nums and an integer target, return indices of the two numbers that add up to target.',tests:[{expr:'twoSum([2,7,11,15], 9)',want:'[0,1]'},{expr:'twoSum([3,2,4], 6)',want:'[1,2]'}]};
    const IQ=[
      `Tell me about yourself and why you're interested in the ${job?.title||'role'} position at ${job?.company||'our company'}.`,
      'What has been your most challenging project so far, and how did you handle the difficulties?',
      'How do you approach learning new technologies quickly when a project demands it?'
    ];

    const fmt=s=>`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    // ── HR Avatar Canvas Animation (similar to AI but with HR colors/emoji) ──
    const animateHR = (cv) => {
      const ctx = cv.getContext('2d');
      let f = 0;
      const loop = () => {
        const w=cv.offsetWidth||220, h=cv.offsetHeight||175;
        cv.width=w; cv.height=h;
        // Background
        ctx.fillStyle='#0A1428'; ctx.fillRect(0,0,w,h);
        const cx=w/2, cy=h*0.42, r=Math.min(w,h)*0.2, p=1+0.035*Math.sin(f*0.045);
        // Glow ring — warm blue/teal for HR
        const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*p*1.6);
        g.addColorStop(0,'rgba(99,179,237,.32)'); g.addColorStop(.5,'rgba(56,161,105,.16)'); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r*p*1.6,0,Math.PI*2); ctx.fill();
        // Circle base
        ctx.fillStyle='#0D1D38';
        ctx.strokeStyle='rgba(99,179,237,'+(0.5+0.3*Math.sin(f*.028))+')';
        ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.arc(cx,cy,r*p,0,Math.PI*2); ctx.fill(); ctx.stroke();
        // HR emoji
        ctx.font=(r*.9)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('👩‍💼',cx,cy);
        // Sound wave lines below (calmer than AI)
        const wy=cy+r*p+12; ctx.lineWidth=1.5;
        for(let i=0;i<3;i++){
          ctx.strokeStyle='rgba(99,179,237,'+(0.45-i*.1)+')'; ctx.beginPath();
          const ww=24+i*9;
          for(let x=cx-ww;x<=cx+ww;x++){ const y=wy+i*7+(2.5+i*1.5)*Math.sin(x*.18+f*.12+i*1.1); x===Math.ceil(cx-ww)?ctx.moveTo(x,y):ctx.lineTo(x,y); }
          ctx.stroke();
        }
        // Label
        ctx.fillStyle='rgba(139,163,188,.75)'; ctx.font='bold 10px sans-serif'; ctx.textBaseline='bottom';
        ctx.fillText(`${HR_NAME} — HR, ${job?.company||'Company'}`, w/2, h-7);
        f++; hrAnimRef.current=requestAnimationFrame(loop);
      };
      loop();
    };

    const startCam=async()=>{
        try{
        setCamErr('');
        const stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
        streamRef.current=stream;
        if(myVideoRef.current){myVideoRef.current.srcObject=stream;myVideoRef.current.play();}
        return true;
        }catch(e){
        setCamErr(e.name==='NotAllowedError'?'Camera access denied. Please allow camera & mic in your browser settings, then try again.':'Could not access camera/mic: '+e.message);
        return false;
        }
    };

    const stopCam=()=>{
        if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
        if(myVideoRef.current){myVideoRef.current.srcObject=null;}
    };

    const startSession=async()=>{
        const ok=await startCam();
        if(!ok) return;
        setStage('active');
        timerRef.current=setInterval(()=>setTimer(t=>t+1),1000);
        // Start HR canvas animation after DOM settles
        setTimeout(()=>{ if(hrCanvasRef.current) animateHR(hrCanvasRef.current); }, 100);
        // HR "joins" after 2s
        setTimeout(()=>{
        setHrJoined(true);
        setChatMsgs(m=>[...m,{from:'system',text:`✅ ${HR_NAME} (HR) has joined the call.`}]);
        },2000);
        // First HR question after 3s
        setTimeout(()=>{
        setChatMsgs(m=>[...m,{from:'hr',text:`Great, I can see you! Let's get started. ${IQ[0]}`}]);
        },3200);
        // Second HR question
        setTimeout(()=>{
        setChatMsgs(m=>[...m,{from:'hr',text:IQ[1]}]);
        },30000);
        // Coding problem after 60s
        setTimeout(()=>{
        setShowProb(true);
        setChatMsgs(m=>[...m,{from:'hr',text:"Now let's move to a short coding assessment. I've loaded a problem in the editor — please walk me through your thinking as you solve it."}]);
        },60000);
    };

    const toggleCam=()=>{
        if(streamRef.current){
        streamRef.current.getVideoTracks().forEach(t=>{t.enabled=!camOn;});
        setCamOn(o=>!o);
        }
    };
    const toggleMic=()=>{
        if(streamRef.current){
        streamRef.current.getAudioTracks().forEach(t=>{t.enabled=!micOn;});
        setMicOn(o=>!o);
        }
    };

    const endSession=()=>{
        stopCam();
        clearInterval(timerRef.current);
        cancelAnimationFrame(hrAnimRef.current);
        setStage('ended');
        setChatMsgs(m=>[...m,{from:'system',text:`Session ended. Thank you for interviewing with ${job?.company||'us'}!`}]);
    };

    useEffect(()=>{
        return()=>{stopCam();clearInterval(timerRef.current);cancelAnimationFrame(hrAnimRef.current);};
    },[]);

    useEffect(()=>{
        if(chatEndRef.current) chatEndRef.current.scrollIntoView({behavior:'smooth'});
    },[chatMsgs]);

    const runCode=()=>{
        setRunning(true);
        setTimeout(()=>{
        try{
            const logs=[];
            // eslint-disable-next-line no-new-func
            new Function('console',code)({log:(...a)=>logs.push({t:a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' '),c:'ogreen'}),error:(...a)=>logs.push({t:a.join(' '),c:'ored'})});
            setOutLines(logs.length?logs:[{t:'// Code ran with no output',c:'ogray'}]);
        }catch(e){setOutLines([{t:'❌ '+e.message,c:'ored'}]);}
        setRunning(false);
        },400);
    };

    const sendChat=()=>{
        if(!chatInput.trim()) return;
        const msg=chatInput.trim(); setChatInput('');
        setChatMsgs(m=>[...m,{from:'me',text:msg}]);
        setTimeout(()=>{
        const hrReplies=[
          "That's a great point! Can you tell me more about that?",
          "Interesting! How did that experience shape your approach to teamwork?",
          "I appreciate that perspective. Let's continue with the next part.",
          "Take your time with the code — think out loud so I can follow your reasoning.",
          "Good answer! That shows strong problem-solving skills.",
          "Thanks for sharing that. How do you handle tight deadlines?",
        ];
        setChatMsgs(m=>[...m,{from:'hr',text:hrReplies[Math.floor(Math.random()*hrReplies.length)]}]);
        },1200);
    };

    const lineNums=code.split('\n').map((_,i)=>i+1).join('\n');
    const handleKey=e=>{
        if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart,en=e.target.selectionEnd;const n=code.substring(0,s)+'  '+code.substring(en);setCode(n);setTimeout(()=>{e.target.selectionStart=e.target.selectionEnd=s+2;},0);}
    };

    // ── LOBBY ──
    if(stage==='lobby') return (
        <div style={{position:'fixed',inset:0,background:'#080C14',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:0}}>
        <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px)',backgroundSize:'48px 48px'}}/>
        <div style={{position:'relative',zIndex:1,maxWidth:520,width:'100%',padding:24,textAlign:'center',animation:'fadeIn .4s ease'}}>
            <div style={{width:72,height:72,background:'linear-gradient(135deg,rgba(99,179,237,.25),rgba(56,161,105,.15))',border:'2px solid rgba(99,179,237,.35)',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 20px',boxShadow:'0 0 40px rgba(99,179,237,.15)'}}>👩‍💼</div>
            <div style={{fontWeight:800,fontSize:22,color:'#fff',marginBottom:6}}>{job?.company||'Company'} — HR Interview</div>
            <div style={{fontSize:14,color:'#8BA3BC',marginBottom:28}}>{job?.title||'Technical Round'} · Interview with {HR_NAME} (HR)</div>
            <div style={{background:'rgba(13,21,38,.9)',border:'1.5px solid rgba(99,179,237,.2)',borderRadius:16,padding:20,marginBottom:20,textAlign:'left'}}>

                <div key={t} style={{display:'flex',gap:12,alignItems:'center',marginBottom:10}}>

            📨 {HR_NAME} from <strong style={{color:'#63B3ED'}}>{job?.company||'the company'}</strong> has been notified and will join once you start the session.

            <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:13,color:'#8BA3BC'}}>Duration</span><span style={{fontSize:13,fontWeight:700,color:'#63B3ED'}}>{fmt(timer)}</span></div>

            </div>
            <button style={{width:'100%',padding:'14px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#63B3ED,#4FD1C5)',color:'#000',fontWeight:800,fontSize:14,cursor:'pointer',marginBottom:10}} onClick={onClose}>✓ Back to Jobs</button>
        </div>
        </div>
    );

    // ── ACTIVE SESSION ──
    return (
<div style={{
  position:'fixed',
  top:0,
  left:0,
  width:'100vw',
  height:'100vh',
  background:'#0A0F1A',
  zIndex:9998,
  display:'flex',
  flexDirection:'column',
  fontFamily:'var(--font-primary)',
  overflow:'hidden'
}}>        {/* TOP BAR */}
        <div style={{background:'#0D1526',borderBottom:'1.5px solid #1E2D4A',padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:20,padding:'4px 12px'}}>

    // ─── POST JOB MODAL (Recruiter adds a job) ────────────────────────────────────
    function PostJobModal({onClose, onPost, addNotif}) {
    const [form,setForm]=useState({title:'',company:'',location:'',type:'Full-time',salary:'',skills:'',description:'',minScore:'40',email:'',deadline:''});
    const [step,setStep]=useState('form');
    const [submitting,setSubmitting]=useState(false);
    const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
    const submit=()=>{
        if(!form.title||!form.company||!form.salary||!form.email){addNotif({type:'error',msg:'⚠️ Please fill Title, Company, Salary & Email',time:'now'});return;}
        setSubmitting(true);
        setTimeout(()=>{setSubmitting(false);setStep('preview');},800);
    };
    const post=()=>{
        const newJob={id:Date.now(),emoji:'🏢',title:form.title,company:form.company,location:form.location||'Remote',type:form.type,salary:form.salary,skills:form.skills.split(',').map(s=>s.trim()).filter(Boolean),match:Math.floor(Math.random()*30)+55,applicants:0,posted:'Just now',minScore:parseInt(form.minScore)||40,description:form.description,recruiterEmail:form.email,deadline:form.deadline,isRecruiterPost:true};
        onPost(newJob);
        setStep('done');
        addNotif({type:'success',msg:`🎉 Job "${form.title}" posted! Students can now apply.`,time:'now'});
    };
    if(step==='done') return (
        <div className="modal-overlay"><div className="modal" style={{textAlign:'center'}}>
        <div style={{fontSize:60,marginBottom:24}}>🚀</div>
        <div style={{fontWeight:800,fontSize:22,color:'var(--accent)',marginBottom:10}}>Job is LIVE!</div>
        <div style={{fontSize:14,color:'var(--text2)',marginBottom:24,lineHeight:1.6}}>Your job posting for <strong style={{color:'var(--text)'}}>{form.title}</strong> at <strong style={{color:'var(--text)'}}>{form.company}</strong> is now visible to all eligible students.</div>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={onClose}>✓ View Job Board →</button>
        </div></div>
    );
    return (
        <div className="modal-overlay"><div className="modal" style={{maxWidth:520}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
            <div style={{fontWeight:800,fontSize:18}}>{step==='preview'?'📋 Preview Job Posting':'📝 Post a Job'}</div>
            <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        {step==='form' && (
        <div style={{display:'flex',flexDirection:'column',gap:14,maxHeight:'70vh',overflowY:'auto',paddingRight:4}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label>Job Title *</label><input value={form.title} onChange={set('title')} placeholder="e.g., Frontend Developer"/></div>
            <div><label>Company Name *</label><input value={form.company} onChange={set('company')} placeholder="e.g., Acme Corp"/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label>Location</label><input value={form.location} onChange={set('location')} placeholder="e.g., Bangalore / Remote"/></div>
            <div><label>Job Type</label><select value={form.type} onChange={set('type')}>{['Full-time','Part-time','Internship','Contract','Remote'].map(t=><option key={t}>{t}</option>)}</select></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label>Salary / Stipend *</label><input value={form.salary} onChange={set('salary')} placeholder="e.g., ₹12-18 LPA"/></div>
            <div><label>Min Career Score</label><input type="number" value={form.minScore} onChange={set('minScore')} min={0} max={100} placeholder="40"/></div>
            </div>
            <div><label>Required Skills (comma-separated)</label><input value={form.skills} onChange={set('skills')} placeholder="e.g., React, Node.js, SQL"/></div>
            <div><label>Job Description</label><textarea rows={3} value={form.description} onChange={set('description')} placeholder="Describe the role, responsibilities, and requirements..." style={{resize:'vertical'}}/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            <div><label>Contact Email *</label><input value={form.email} onChange={set('email')} placeholder="hr@company.com"/></div>
            <div><label>Application Deadline</label><input type="date" value={form.deadline} onChange={set('deadline')}/></div>
            </div>
            <div style={{background:'rgba(0,200,255,.07)',border:'1px solid rgba(0,200,255,.2)',borderRadius:12,padding:'10px 14px',fontSize:12,color:'var(--accent2)'}}>ℹ️ Job will be live instantly. Students matching the minimum score will see it highlighted as eligible.</div>
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} disabled={submitting} onClick={submit}>{submitting?<span className="loading"/>:null} Preview Posting →</button>
        </div>
        )}
        {step==='preview' && (
        <div>
            <div className="card" style={{padding:20,marginBottom:24,borderLeft:'3px solid var(--accent)'}}>
            <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:14}}>
                <div className="company-logo" style={{background:'var(--surface2)',color:'var(--text)',fontSize:24}}>🏢</div>
                <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16}}>{form.title}</div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>{form.company} · {form.location||'Remote'}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    <span className="badge badge-gray">{form.type}</span>
                    <span className="badge badge-green">{form.salary}</span>
                    <span className="badge badge-blue">Min Score: {form.minScore}</span>
                </div>
                </div>
            </div>
            {form.description && <div style={{fontSize:13,color:'var(--text2)',marginBottom:10,lineHeight:1.5}}>{form.description}</div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{form.skills.split(',').map(s=>s.trim()).filter(Boolean).map(s=><span key={s} className="tag">{s}</span>)}</div>
            {form.deadline && <div style={{marginTop:10,fontSize:12,color:'var(--text3)'}}>📅 Deadline: {form.deadline}</div>}
            </div>
            <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost" onClick={()=>setStep('form')}>← Edit</button>
            <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={post}>🚀 Publish Job</button>
            </div>
        </div>
        )}
        </div></div>
    );
    }

    // ─── JOBS PAGE ────────────────────────────────────────────────────────────────
    function JobsPage({user, addNotif}) {

    const [applied,setApplied]=useState([]);
    const [filter,setFilter]=useState('all');
    const [postModal,setPostModal]=useState(false);
    const [extraJobs,setExtraJobs]=useState(()=>{
      try { return JSON.parse(localStorage.getItem('cr_extraJobs')||'[]'); } catch { return []; }
    });
    const [interviewJob,setInterviewJob]=useState(null);
    const [scheduleInterviewJob,setScheduleInterviewJob]=useState(null);
    const [scheduledInterviews,setScheduledInterviews]=useState([]);

    // Persist extraJobs to localStorage whenever they change
    useEffect(()=>{
      try { localStorage.setItem('cr_extraJobs', JSON.stringify(extraJobs)); } catch {}
    },[extraJobs]);

    const allJobs=[...JOBS,...extraJobs];
    const filtered=allJobs.filter(j=>{
        if(search && !j.title.toLowerCase().includes(search.toLowerCase()) && !j.company.toLowerCase().includes(search.toLowerCase())) return false;
        if(filter==='eligible' && j.minScore>(user.careerScore?.overall||0)) return false;
        if(filter==='matched' && j.match<70) return false;
        return true;

        </div>

        {tab==='browse' && (

            <div style={{fontSize:16}}>🤖</div>

        <div style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>

            <div style={{display:'flex',gap:4}}>

        </div>

    // ─── AI COACH PAGE (Real API with streaming) ──────────────────────────────────
    function AICoachPage({user, setPage}) {
    const [messages,setMessages]=useState([
        {role:'bot',text:`Hey ${user.name.split(' ')[0]}! 👋 I'm your AI Career Coach powered by Claude.\n\nYour current career score is **${user.careerScore?.overall||0}/100**.\n\nHere's my initial analysis:\n\n📊 **DSA** (${user.careerScore?.dsa||0}/100) — Needs improvement. Focus on Trees & Graphs next.\n📄 **Resume** (${user.careerScore?.resume||0}/100) — ATS score is low. Add more quantified achievements.\n🎤 **Interview** (${user.careerScore?.interview||0}/100) — Book a mock interview to boost this fast.\n\nYou're **${Math.max(0,75-(user.careerScore?.overall||0))} points away** from being interview-ready (75+)!\n\nAsk me anything — I have full context on your profile and progress. 🚀`,streaming:false}
    ]);
    const [input,setInput]=useState('');
    const [loading,setLoading]=useState(false);
    const chatRef=useRef(null);
    const [weeklyAnalyzing,setWeeklyAnalyzing]=useState(false);
    const [weeklyReport,setWeeklyReport]=useState(null);

    const SYSTEM_PROMPT=`You are an expert AI career coach for Career Router, an EdTech platform for Indian software engineers. You have full context on the student's profile:

    Student: ${user.name}
    Career Score: ${user.careerScore?.overall||0}/100
    Score Breakdown:
    - Coding: ${user.careerScore?.coding||0}/100
    - DSA: ${user.careerScore?.dsa||0}/100  
    - Consistency: ${user.careerScore?.consistency||0}/100
    - Resume: ${user.careerScore?.resume||0}/100
    - Interview: ${user.careerScore?.interview||0}/100
    - Projects: ${user.careerScore?.projects||0}/100

    Current Progress:
    - C Basics: ${user.progress?.basics||0}%
    - DSA: ${user.progress?.dsa||0}%
    - Web Dev: ${user.progress?.development||0}%
    - Resume: ${user.progress?.resume||0}%
    - Interview: ${user.progress?.interview||0}%
    - Jobs: ${user.progress?.jobs||0}%

    Solved Problems: ${user.solvedProblems?.length||0} total
    Streak: ${user.streak||0} days
    Skills: ${(user.skills||[]).join(', ')}

    Be concise, motivating, and actionable. Give specific advice based on their actual scores. Use emojis sparingly. Format with line breaks for readability. Address them by first name sometimes. Focus on Indian tech job market (Flipkart, Swiggy, Zepto, Razorpay, Google India etc).`;

    const send=async()=>{
        if(!input.trim()||loading) return;
        const userMsg=input.trim();
        setInput('');
        setMessages(m=>[...m,{role:'user',text:userMsg}]);
        setLoading(true);

        const botMsgId=Date.now();
        setMessages(m=>[...m,{role:'bot',text:'',streaming:true,id:botMsgId}]);

        try {
        const history=messages.map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
        history.push({role:'user',content:userMsg});

        let fullText='';
        await callClaudeStream(
            history, SYSTEM_PROMPT, 800,
            (chunk)=>{
            fullText=chunk;
            setMessages(m=>m.map(msg=>msg.id===botMsgId?{...msg,text:chunk,streaming:true}:msg));
            }
        );
        setMessages(m=>m.map(msg=>msg.id===botMsgId?{...msg,text:fullText,streaming:false}:msg));
        } catch(e){
        const errMsg=`Sorry, I had trouble connecting. Error: ${e.message}\n\nBased on your profile, I recommend focusing on your DSA score (${user.careerScore?.dsa||0}/100) first — it's your biggest growth area!`;
        setMessages(m=>m.map(msg=>msg.id===botMsgId?{...msg,text:errMsg,streaming:false}:msg));
        }
        setLoading(false);
    };

    const generateWeeklyReport=async()=>{
        setWeeklyAnalyzing(true);
        try {
        const weakestEntry=Object.entries(user.careerScore||{}).filter(([k])=>k!=='overall').sort((a,b)=>a[1]-b[1])[0]||['dsa',0];
        const prompt=`Generate a brief weekly progress report for ${user.name.split(' ')[0]} with these stats:
    - Career Score: ${user.careerScore?.overall||0}/100 (target: 75)
    - Problems solved: ${user.solvedProblems?.length||0}
    - Streak: ${user.streak||0} days
    - Weakest area: ${weakestEntry[0]}

    Return JSON only:
    {
    "headline": "<motivating one-liner>",
    "topWin": "<biggest achievement this week>",
    "focusNext": "<top priority for next week>",
    "streakMessage": "<comment on their streak>",
    "score_delta": "+2",
    "prediction": "<prediction for reaching interview-ready>"
    }`;
        const result=await callClaude([{role:'user',content:prompt}],'You are a concise analytics assistant. Return only valid JSON.',400);
        const jsonMatch=result.match(/\{[\s\S]*\}/);
        if(jsonMatch) setWeeklyReport(JSON.parse(jsonMatch[0]));
        } catch(e){
        setWeeklyReport({headline:"Keep going — you're making real progress!",topWin:`Maintained a ${user.streak||0}-day streak`,focusNext:'Solve 5 tree problems to boost DSA score',streakMessage:`${user.streak||0} days is impressive! Don't break the chain.`,score_delta:'+2',prediction:'At this pace, interview-ready in ~3 weeks'});
        }
        setWeeklyAnalyzing(false);
    };

    useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages]);

    const suggestions=['How to improve my DSA score?','Analyze my resume score','Am I interview ready?','Which jobs should I apply to?','What should I study this week?','Give me a study plan'];

    return (
        <div className="page-content fade-in">
        <div className="grid-2" style={{gap:20,alignItems:'start'}}>
            <div className="card" style={{overflow:'hidden',display:'flex',flexDirection:'column',height:'calc(100vh - 140px)'}}>
            <div style={{padding:'20px 26px',borderBottom:'1.5px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>

                <div>
                <div style={{fontWeight:700,fontSize:14}}>AI Career Coach</div>
                <div style={{fontSize:11,display:'flex',alignItems:'center',gap:6}}>
                    <span style={{width:6,height:6,background:loading?'var(--accent4)':'var(--accent)',borderRadius:'50%',display:'inline-block',animation:loading?'pulse .8s infinite':'none'}}/>
                    <span style={{color:'var(--accent)'}}>{loading?'Thinking...':'Online — Claude AI'}</span>
                </div>
                </div>
                <div style={{marginLeft:'auto'}}><div className="api-badge">Claude AI</div></div>
            </div>

            <div ref={chatRef} style={{flex:1,overflowY:'auto',padding:16}}>
                {messages.map((m,i)=>(
                <div key={i} className={`ai-message ${m.role} ${m.streaming?'ai-streaming':''}`} style={{whiteSpace:'pre-line'}}>
                    {m.text.replace(/\*\*(.*?)\*\*/g,'$1')}
                    {m.streaming && m.text==='' && (
                    <span style={{display:'inline-flex',gap:3,alignItems:'center',padding:'4px 0'}}>
                        <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>

                    )}

                ))}
            </div>

            <div style={{padding:12,borderTop:'1.5px solid var(--border)'}}>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                {suggestions.slice(0,4).map(s=>(
                    <button key={s} className="btn btn-ghost btn-sm" style={{fontSize:11,padding:'4px 10px'}} onClick={()=>setInput(s)}>{s}</button>

                <div style={{display:'flex',gap:10}}>
                <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()} placeholder="Ask your AI coach anything..." disabled={loading}/>
                <button className="btn btn-primary btn-sm" onClick={send} disabled={loading||!input.trim()}>
                    {loading?<span className="loading"/>:'Send'}
                </button>
                </div>
            </div>
            </div>

            <div>
            <div className="card" style={{padding:20,marginBottom:24}}>
                <div style={{fontWeight:800,fontSize:15,marginBottom:24}}>🎯 Career Readiness Score</div>
                <div style={{display:'flex',justifyContent:'center',marginBottom:24}}>
                <ScoreRing score={user.careerScore?.overall||0} size={120}/>
                </div>
                <div style={{background:(user.careerScore?.overall||0)>=75?'rgba(0,245,160,.1)':'rgba(255,217,61,.1)',border:`1px solid ${(user.careerScore?.overall||0)>=75?'rgba(0,245,160,.3)':'rgba(255,217,61,.3)'}`,borderRadius:10,padding:12,textAlign:'center',marginBottom:24}}>
                <div style={{fontWeight:700,color:(user.careerScore?.overall||0)>=75?'var(--accent)':'var(--accent4)'}}>
                    {(user.careerScore?.overall||0)>=75?'✅ Interview Ready!':'⏳ Need '+(75-(user.careerScore?.overall||0))+' more points'}
                </div>
                </div>
                {Object.entries(user.careerScore||{}).filter(([k])=>k!=='overall').map(([k,v])=>{
                const labels={coding:'💻 Coding',dsa:'📊 DSA',consistency:'🔥 Consistency',resume:'📄 Resume',interview:'🎤 Interview',projects:'🏗️ Projects'};
                return (
                    <div key={k} style={{marginBottom:10}}>
                    <div className="skill-bar-label"><span style={{fontSize:12}}>{labels[k]}</span><span style={{fontSize:12,fontFamily:'Poppins',color:'var(--accent)'}}>{v}/100</span></div>

            </div>

            <div className="card" style={{padding:20}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
                <div style={{fontWeight:800,fontSize:15}}>📊 Weekly AI Report</div>
                <button className="btn btn-ghost btn-sm" onClick={generateWeeklyReport} disabled={weeklyAnalyzing}>
                    {weeklyAnalyzing?<><span className="loading"/> Generating...</>:'🤖 Generate'}

                {!weeklyReport && !weeklyAnalyzing && (

                {weeklyReport && !weeklyAnalyzing && (

        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',flexDirection:'column',gap:16}}>
            <div className="logo-mark" style={{width:52,height:52}}>
                <svg viewBox="0 0 20 20" fill="currentColor" width="28" height="28"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1h4v1a2 2 0 11-4 0zM12 14c.015-.998.21-1.96.512-2.834.857-2.514-1.888-4.166-2.512-4.166s-3.369 1.652-2.512 4.166C7.79 12.04 7.985 13.002 8 14h4z"/></svg>
            </div>
            <div style={{color:'var(--text2)',fontSize:14,fontFamily:'Poppins'}}>Loading...</div>
        </div>
        );
    }

    const PAGE_TITLES={dashboard:'Dashboard',roadmap:'Roadmap',problems:'Problems',editor:'Code Editor',courses:'Courses',resume:'Resume Builder',interview:'Interview Center',jobs:'Job Board',ai:'AI Coach',leaderboard:'Leaderboard'};
    const unreadCount=(currentUser?.notifications||[]).filter(n=>!n.read).length;

    const renderPage=()=>{
        switch(page){
        case 'dashboard': return <Dashboard user={currentUser} setPage={setPage} setActiveProblem={setActiveProblem}/>;
        case 'problems': return <ProblemsPage user={currentUser} setPage={setPage} setActiveProblem={setActiveProblem}/>;
        case 'editor': return <EditorPage problem={activeProblem} user={currentUser} addNotif={addNotif} updateUser={updateUser}/>;
        case 'roadmap': return <RoadmapPage user={currentUser} setPage={setPage} updateUser={updateUser}/>;
        case 'courses': return <CoursesPage user={currentUser} addNotif={addNotif}/>;
        case 'resume': return <ResumePage user={currentUser} addNotif={addNotif}/>;
        case 'interview': return <InterviewPage user={currentUser} addNotif={addNotif}/>;
        case 'jobs': return <JobsPage user={currentUser} addNotif={addNotif}/>;
        case 'ai': return <AICoachPage user={currentUser} setPage={setPage}/>;
        case 'leaderboard': return <LeaderboardPage user={currentUser}/>;
        default: return <Dashboard user={currentUser} setPage={setPage} setActiveProblem={setActiveProblem}/>;
        }
    };

    return (
        <div>
        {/* ─── NOT LOGGED IN → Landing ─── */}
        {!currentUser && (
            <>
            <LandingPage onCTA={handleCTA} onLogin={handleLoginClick}/>
            {showRoleModal && <RoleSelectModal onSelect={handleRoleSelect} onClose={()=>setShowRoleModal(false)}/>}
            {showAuthModal && (
                <AuthPage
                initialRole={authConfig.role}
                initialMode={authConfig.mode}
                onSuccess={handleAuthSuccess}
                onClose={()=>setShowAuthModal(false)}
                />
            )}
            </>
        )}

        {/* ─── LOGGED IN → App ─── */}
        {currentUser && (
            <div>
            <Sidebar page={page} setPage={p=>{setPage(p);setShowNotifPanel(false);}} user={currentUser} onLogout={logout} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}/>
            <div className={`main${sidebarCollapsed?' sidebar-collapsed':''}`}>
                {page==='editor'?(
                <div>
                    <div className="topbar">
                    <div style={{display:'flex',alignItems:'center',gap:16}}>
                        <div className="topbar-menu-btn" onClick={()=>setSidebarCollapsed(c=>!c)}><span/><span/><span/></div>
                        <button className="btn btn-ghost btn-sm" onClick={()=>setPage('problems')}>← Problems</button>
                        {activeProblem && <div style={{fontWeight:700}}>{activeProblem.title}</div>}
                    </div>
                    <div style={{display:'flex',gap:10,alignItems:'center'}}>
                        <div className="api-badge">🤖 AI Review Ready</div>
                        {activeProblem && <span className={`badge badge-${activeProblem.difficulty==='Easy'?'green':activeProblem.difficulty==='Medium'?'yellow':'red'}`}>{activeProblem.difficulty}</span>}
                        {activeProblem && <span className="badge badge-gray">+{activeProblem.xp} XP</span>}
                    </div>
                    </div>
                    {renderPage()}
                </div>
                ):(
                <div>
                    <Topbar title={PAGE_TITLES[page]||'Career Router'} user={currentUser} setPage={setPage} unreadCount={unreadCount} showNotifs={showNotifPanel} setShowNotifs={setShowNotifPanel} sidebarCollapsed={sidebarCollapsed} setSidebarCollapsed={setSidebarCollapsed}/>
                    {showNotifPanel && (
                    <div style={{position:'fixed',top:60,right:0,width:360,background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:'0 0 0 12px',padding:16,zIndex:200,maxHeight:'70vh',overflowY:'auto',boxShadow:'0 8px 32px rgba(0,0,0,.4)'}}>
                        <div style={{fontWeight:700,marginBottom:24,display:'flex',justifyContent:'space-between'}}>
                        Notifications
                        <button className="btn btn-ghost btn-sm" onClick={()=>setShowNotifPanel(false)}>✕</button>
                        </div>
                        {(currentUser.notifications||[]).length===0?(
                        <div style={{textAlign:'center',padding:24,color:'var(--text3)'}}>No notifications yet</div>
                        ):(currentUser.notifications||[]).map(n=>(
                        <div key={n.id} style={{padding:'15px',borderRadius:12,marginBottom:10,background:n.read?'':'var(--surface2)',border:'1.5px solid var(--border)',display:'flex',gap:10}}>
                            <span>{n.type==='success'?'✅':'ℹ️'}</span>
                            <div><div style={{fontSize:13}}>{n.msg}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{n.time}</div></div>
                            {!n.read && <div style={{width:6,height:6,background:'var(--accent)',borderRadius:'50%',marginLeft:'auto',marginTop:4,flexShrink:0}}/>}
                        </div>
                        ))}
                    </div>
                    )}
                    <div key={page} className="fade-in">{renderPage()}</div>
                </div>
                )}
            </div>
            </div>
        )}

        <NotifToast notifs={toasts} dismiss={dismissToast}/>
        </div>
    );
    }

    ReactDOM.render(<App/>, document.getElementById('root'));
    </script>
    </body>
    </html>
