<!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Career Router — AI-Powered EdTech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    /* ══════════════════════════════════════════
       LIGHT THEME — Default (Orange/White EdTech)
    ══════════════════════════════════════════ */
    :root{
    --bg:#F7F8FC;--surface:#FFFFFF;--surface2:#F0F2F8;--border:#E4E8F0;
    --accent:#F97316;--accent2:#3B82F6;--accent3:#EF4444;--accent4:#F59E0B;
    --accent-light:#FFF4ED;--accent-mid:#FDBA74;
    --text:#1E2A3B;--text2:#64748B;--text3:#94A3B8;
    --shadow-sm:0 1px 4px rgba(0,0,0,.07);
    --shadow:0 4px 16px rgba(0,0,0,.09);
    --shadow-lg:0 8px 32px rgba(0,0,0,.13);
    --glow:0 4px 20px rgba(249,115,22,.4);
    --glow2:0 4px 20px rgba(59,130,246,.3);
    --font-primary:'Nunito',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --font-secondary:'Poppins',sans-serif;
    --font-size-xs:11px;--font-size-sm:12px;--font-size-base:14px;
    --font-size-lg:16px;--font-size-xl:18px;--font-size-2xl:20px;--font-size-3xl:22px;
    --font-weight-regular:400;--font-weight-medium:600;--font-weight-bold:700;--font-weight-black:800;
    --spacing-xs:5px;--spacing-sm:10px;--spacing-md:15px;--spacing-lg:22px;
    --spacing-xl:28px;--spacing-2xl:36px;--spacing-3xl:44px;--spacing-4xl:54px;
    --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;--radius-round:50%;
    --transition-fast:0.18s;--transition-normal:0.3s;--transition-slow:0.5s;
    }

    /* ══════════════════════════════════════════
       NEON DARK THEME
    ══════════════════════════════════════════ */
    body.theme-neon{
    --bg:#080C14;--surface:#0D1526;--surface2:#111D33;--border:#1E2D4A;
    --accent:#00F5A0;--accent2:#00C8FF;--accent3:#FF6B6B;--accent4:#FFD93D;
    --accent-light:rgba(0,245,160,.1);--accent-mid:rgba(0,245,160,.5);
    --text:#E8F4F8;--text2:#8BA3BC;--text3:#4A6580;
    --shadow-sm:0 1px 4px rgba(0,0,0,.5);
    --shadow:0 4px 20px rgba(0,0,0,.6);
    --shadow-lg:0 8px 40px rgba(0,0,0,.7);
    --glow:0 0 22px rgba(0,245,160,.55);
    --glow2:0 0 22px rgba(0,200,255,.45);
    }

    /* ══════════════════════════════════════════
       PROFESSIONAL THEME
    ══════════════════════════════════════════ */
    body.theme-professional{
    --bg:#F8FAFC;--surface:#FFFFFF;--surface2:#F1F5F9;--border:#CBD5E1;
    --accent:#1D4ED8;--accent2:#0EA5E9;--accent3:#DC2626;--accent4:#D97706;
    --accent-light:#EFF6FF;--accent-mid:#93C5FD;
    --text:#0F172A;--text2:#475569;--text3:#94A3B8;
    --font-primary:'Poppins',sans-serif;
    --font-secondary:'Poppins',sans-serif;
    --glow:0 4px 20px rgba(29,78,216,.3);
    }

    /* ══════════════════════════════════════════
       LINKEDIN / LEETCODE THEME — Crisp Professional
    ══════════════════════════════════════════ */
    body.theme-linkedin{
    --bg:#F3F2EF;--surface:#FFFFFF;--surface2:#F3F2EF;--border:#D0CFC9;
    --accent:#0A66C2;--accent2:#057642;--accent3:#CC1016;--accent4:#915907;
    --accent-light:#EAF4FF;--accent-mid:#8CC4F0;
    --text:#000000E6;--text2:#00000099;--text3:#0000006B;
    --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
    --shadow:0 4px 12px rgba(0,0,0,.1);
    --shadow-lg:0 8px 24px rgba(0,0,0,.12);
    --glow:0 4px 14px rgba(10,102,194,.3);
    --glow2:0 4px 14px rgba(5,118,66,.3);
    --font-primary:'Inter',sans-serif;
    --font-secondary:'IBM Plex Sans',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --font-size-xs:11px;--font-size-sm:12px;--font-size-base:14px;
    --font-size-lg:16px;--font-size-xl:18px;--font-size-2xl:20px;--font-size-3xl:22px;
    --font-weight-regular:400;--font-weight-medium:500;--font-weight-bold:600;--font-weight-black:700;
    --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-round:50%;
    }

    /* ══════════════════════════════════════════
       LEETCODE DARK — Professional Night Mode
    ══════════════════════════════════════════ */
    body.theme-leetdark{
    --bg:#1A1A1A;--surface:#282828;--surface2:#333333;--border:#3E3E3E;
    --accent:#FFA116;--accent2:#00B8A3;--accent3:#EF4743;--accent4:#FFCD3C;
    --accent-light:rgba(255,161,22,.12);--accent-mid:rgba(255,161,22,.5);
    --text:#EFEFEF;--text2:#AFAFAF;--text3:#6A6A6A;
    --shadow-sm:0 1px 4px rgba(0,0,0,.4);
    --shadow:0 4px 16px rgba(0,0,0,.5);
    --shadow-lg:0 8px 32px rgba(0,0,0,.6);
    --glow:0 4px 20px rgba(255,161,22,.35);
    --glow2:0 4px 20px rgba(0,184,163,.3);
    --font-primary:'Inter',sans-serif;
    --font-secondary:'IBM Plex Sans',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --font-size-xs:11px;--font-size-sm:12px;--font-size-base:14px;
    --font-size-lg:16px;--font-size-xl:18px;--font-size-2xl:20px;--font-size-3xl:22px;
    --font-weight-regular:400;--font-weight-medium:500;--font-weight-bold:600;--font-weight-black:700;
    --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-round:50%;
    }

    /* LinkedIn theme element overrides */
    body.theme-linkedin .logo-mark{background:var(--accent);box-shadow:0 2px 8px rgba(10,102,194,.3);}
    body.theme-linkedin .btn-primary{color:#fff;box-shadow:0 2px 8px rgba(10,102,194,.25);}
    body.theme-linkedin .hero::before{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(10,102,194,.08) 0%,transparent 70%);}
    body.theme-linkedin .hero-grid{background-image:linear-gradient(rgba(10,102,194,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(10,102,194,.04) 1px,transparent 1px);}
    body.theme-linkedin .hero-tag{background:var(--accent-light);border-color:rgba(10,102,194,.3);color:var(--accent);}
    body.theme-linkedin .api-badge{background:var(--accent-light);border-color:rgba(10,102,194,.3);color:var(--accent);}
    body.theme-linkedin .nav-item.active{background:var(--accent-light);color:var(--accent);border-color:rgba(10,102,194,.2);}
    body.theme-linkedin .card:hover{border-color:rgba(10,102,194,.3);}
    body.theme-linkedin .score-ring-num{color:var(--accent);}
    body.theme-linkedin .stat-num{color:var(--accent);}
    body.theme-linkedin .tab.active{color:var(--accent);}
    body.theme-linkedin .ai-message.user{background:var(--accent-light);border-color:rgba(10,102,194,.2);}
    body.theme-linkedin .rm-hero::before{background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(10,102,194,.06),transparent 70%);}

    /* LeetCode dark element overrides */
    body.theme-leetdark .logo-mark{background:var(--accent);color:#1A1A1A;box-shadow:0 0 16px rgba(255,161,22,.35);}
    body.theme-leetdark .btn-primary{color:#1A1A1A;}
    body.theme-leetdark .hero::before{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,161,22,.09) 0%,transparent 70%);}
    body.theme-leetdark .hero-grid{background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);}
    body.theme-leetdark .hero-tag{background:rgba(255,161,22,.12);border-color:rgba(255,161,22,.3);color:var(--accent);}
    body.theme-leetdark .api-badge{background:rgba(255,161,22,.12);border-color:rgba(255,161,22,.3);color:var(--accent);}
    body.theme-leetdark .nav-item.active{background:rgba(255,161,22,.1);color:var(--accent);border-color:rgba(255,161,22,.2);}
    body.theme-leetdark .card:hover{border-color:rgba(255,161,22,.25);}
    body.theme-leetdark .score-ring-num{color:var(--accent);text-shadow:0 0 10px rgba(255,161,22,.4);}
    body.theme-leetdark .stat-num{color:var(--accent);text-shadow:0 0 10px rgba(255,161,22,.3);}
    body.theme-leetdark .tab.active{color:var(--accent);}
    body.theme-leetdark .ai-message.user{background:rgba(255,161,22,.1);border-color:rgba(255,161,22,.2);}
    body.theme-leetdark .code-area{background:#1A1A1A;border-color:#3E3E3E;}
    body.theme-leetdark .logo-mark{animation:lcPulse 3s ease-in-out infinite;}
    @keyframes lcPulse{0%,100%{box-shadow:0 0 8px rgba(255,161,22,.3);}50%{box-shadow:0 0 22px rgba(255,161,22,.7),0 0 44px rgba(255,161,22,.2);}}
    body.theme-leetdark .price-card.featured{box-shadow:0 0 40px rgba(255,161,22,.12);}
    body.theme-leetdark input,body.theme-leetdark select,body.theme-leetdark textarea{background:var(--surface2);}
    body.theme-leetdark input:focus,body.theme-leetdark select:focus,body.theme-leetdark textarea:focus{box-shadow:0 0 0 2px rgba(255,161,22,.2);}
    body.theme-leetdark .rm-hero::before{background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(255,161,22,.07),transparent 70%);}
    body.theme-leetdark .airing{box-shadow:0 0 16px rgba(255,161,22,.5);}
    body.theme-leetdark .badge-green{background:rgba(0,184,163,.15);color:#00B8A3;border-color:rgba(0,184,163,.25);}
    body.theme-leetdark .badge-blue{background:rgba(0,184,163,.15);color:#00B8A3;border-color:rgba(0,184,163,.25);}
    body.theme-leetdark .rm-diff-easy{background:rgba(0,184,163,.12);color:#00B8A3;border-color:rgba(0,184,163,.2);}
    body.theme-leetdark .tbar{background:rgba(255,161,22,.07);border-color:rgba(255,161,22,.15);}

    /* ── BASE ── */
    body{background:var(--bg);color:var(--text);font-family:var(--font-primary);overflow-x:hidden;font-size:var(--font-size-base);transition:background .3s,color .3s;}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--accent);}

    /* ══════════════════════════════════════════
       THEME TOGGLE BAR
    ══════════════════════════════════════════ */
    .theme-toggle{position:fixed;top:16px;right:50%;transform:translateX(50%);z-index:9999;display:flex;align-items:center;gap:2px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:4px 5px;box-shadow:var(--shadow);transition:background .3s,border-color .3s;}
    .toggle-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:none;padding:6px 11px;border-radius:40px;cursor:pointer;font-size:11px;font-weight:800;color:var(--text2);transition:all .2s;font-family:var(--font-primary);white-space:nowrap;letter-spacing:.3px;}
    .toggle-btn:hover{color:var(--accent);}
    .toggle-btn.active{background:var(--accent);color:#fff;box-shadow:var(--glow);}
    body.theme-neon .toggle-btn.active{color:#000;}
    body.theme-leetdark .toggle-btn.active{color:#1A1A1A;}
    .t-icon{font-size:13px;}

    /* ══════════════════════════════════════════
       NEON GLOW EFFECTS
    ══════════════════════════════════════════ */
    @keyframes neonPulse{0%,100%{box-shadow:0 0 6px rgba(0,245,160,.3),0 0 12px rgba(0,245,160,.15);}50%{box-shadow:0 0 22px rgba(0,245,160,.8),0 0 44px rgba(0,245,160,.4),0 0 66px rgba(0,245,160,.2);}}
    @keyframes neonBlue{0%,100%{box-shadow:0 0 6px rgba(0,200,255,.3);}50%{box-shadow:0 0 22px rgba(0,200,255,.8),0 0 44px rgba(0,200,255,.4);}}
    @keyframes neonOrange{0%,100%{box-shadow:0 0 6px rgba(249,115,22,.3);}50%{box-shadow:0 0 22px rgba(249,115,22,.7),0 0 40px rgba(249,115,22,.3);}}

    body.theme-neon .logo-mark{animation:neonPulse 2.5s ease-in-out infinite;}
    body.theme-neon .btn-primary:hover{box-shadow:0 0 30px rgba(0,245,160,.8);}
    body.theme-neon .nav-item.active{box-shadow:inset 0 0 12px rgba(0,245,160,.1);}
    body.theme-neon .api-badge{animation:neonBlue 2s ease-in-out infinite;}
    body.theme-neon .score-ring-num{text-shadow:0 0 16px rgba(0,245,160,.7);}
    body.theme-neon .card:hover{box-shadow:0 0 20px rgba(0,245,160,.12),var(--shadow);}
    body.theme-neon .price-card.featured{box-shadow:0 0 40px rgba(0,245,160,.15);}
    body.theme-neon .airing{animation:neonPulse 2.5s ease-in-out infinite;}
    body.theme-neon .stat-num{text-shadow:0 0 14px rgba(0,245,160,.5);}
    body.theme-neon input:focus,body.theme-neon select:focus,body.theme-neon textarea:focus{box-shadow:0 0 0 3px rgba(0,245,160,.15),0 0 12px rgba(0,245,160,.08);}

    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0;}to{transform:translateX(0);opacity:1;}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(249,115,22,.25);}50%{box-shadow:0 0 26px rgba(249,115,22,.6);}}
    @keyframes glowNeon{0%,100%{box-shadow:0 0 5px rgba(0,245,160,.3);}50%{box-shadow:0 0 25px rgba(0,245,160,.7);}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    @keyframes typing{0%,60%,100%{opacity:1;}30%{opacity:0;}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
    @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
    @keyframes callPulse{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.5);}70%{box-shadow:0 0 0 16px rgba(249,115,22,0);}}
    @keyframes callPulseNeon{0%,100%{box-shadow:0 0 0 0 rgba(0,245,160,.5);}70%{box-shadow:0 0 0 16px rgba(0,245,160,0);}}
    @keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6);}70%{box-shadow:0 0 0 12px rgba(239,68,68,0);}}
    @keyframes outSlide{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

    .fade-in{animation:fadeIn .4s ease forwards;}
    .slide-in{animation:slideIn .3s ease forwards;}

    /* ── CODE AREA ── */
    .code-area{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;background:#0F172A;border:1.5px solid #334155;border-radius:12px;padding:20px;color:#E2E8F0;resize:none;width:100%;min-height:300px;outline:none;}
    .code-area:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,.12);}
    body.theme-neon .code-area:focus{box-shadow:0 0 0 3px rgba(0,245,160,.15),0 0 14px rgba(0,245,160,.1);}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;gap:var(--spacing-sm);padding:11px var(--spacing-lg);border-radius:var(--radius-md);border:none;cursor:pointer;font-family:var(--font-primary);font-weight:var(--font-weight-bold);font-size:var(--font-size-sm);transition:all var(--transition-fast);}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,.3);}
    body.theme-neon .btn-primary{color:#000;box-shadow:0 0 15px rgba(0,245,160,.4);}
    .btn-primary:hover{filter:brightness(1.08);box-shadow:var(--glow);transform:translateY(-1px);}
    .btn-primary:disabled{background:#CBD5E1;color:#94A3B8;cursor:not-allowed;transform:none;box-shadow:none;filter:none;}
    body.theme-neon .btn-primary:disabled{background:var(--border);color:var(--text3);}
    .btn-secondary{background:transparent;color:var(--accent);border:2px solid var(--accent);}
    .btn-secondary:hover{background:var(--accent-light);}
    .btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border);}
    .btn-ghost:hover{border-color:var(--text2);color:var(--text);background:var(--surface2);}
    .btn-danger{background:rgba(239,68,68,.08);color:var(--accent3);border:1.5px solid rgba(239,68,68,.25);}
    body.theme-neon .btn-danger{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.3);}
    .btn-danger:hover{background:rgba(239,68,68,.16);}
    .btn-blue{background:rgba(59,130,246,.08);color:var(--accent2);border:1.5px solid rgba(59,130,246,.25);}
    body.theme-neon .btn-blue{background:rgba(0,200,255,.12);border-color:rgba(0,200,255,.3);}
    .btn-blue:hover{background:rgba(59,130,246,.15);}
    .btn-sm{padding:6px 14px;font-size:var(--font-size-xs);}
    .btn-lg{padding:15px var(--spacing-2xl);font-size:var(--font-size-lg);}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}

    /* ── CARDS ── */
    .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);transition:all var(--transition-fast);box-shadow:var(--shadow-sm);}
    .card:hover{border-color:rgba(249,115,22,.28);box-shadow:var(--shadow);}
    body.theme-neon .card:hover{border-color:rgba(0,245,160,.22);}
    .card-glow{box-shadow:0 0 26px rgba(249,115,22,.09);}

    /* ── BADGES ── */
    .badge{display:inline-flex;align-items:center;gap:var(--spacing-xs);padding:4px 12px;border-radius:20px;font-size:var(--font-size-xs);font-weight:var(--font-weight-black);font-family:var(--font-secondary);}
    .badge-green{background:#DCFCE7;color:#15803D;border:1px solid #BBF7D0;}
    body.theme-neon .badge-green{background:rgba(0,245,160,.15);color:#00F5A0;border-color:rgba(0,245,160,.25);}
    .badge-blue{background:#DBEAFE;color:#1D4ED8;border:1px solid #BFDBFE;}
    body.theme-neon .badge-blue{background:rgba(0,200,255,.15);color:#00C8FF;border-color:rgba(0,200,255,.25);}
    .badge-red{background:#FEE2E2;color:#DC2626;border:1px solid #FECACA;}
    body.theme-neon .badge-red{background:rgba(255,107,107,.15);color:#FF6B6B;border-color:rgba(255,107,107,.25);}
    .badge-yellow{background:#FEF9C3;color:#A16207;border:1px solid #FDE047;}
    body.theme-neon .badge-yellow{background:rgba(255,217,61,.15);color:#FFD93D;border-color:rgba(255,217,61,.25);}
    .badge-gray{background:var(--surface2);color:var(--text2);border:1.5px solid var(--border);}
    .badge-purple{background:#F3E8FF;color:#7C3AED;border:1px solid #DDD6FE;}
    body.theme-neon .badge-purple{background:rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.25);}
    .badge-orange{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mid);}

    /* ── PROGRESS ── */
    .progress-bar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
    body.theme-neon .progress-bar{background:var(--border);}
    .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-mid));transition:width .6s ease;}

    /* ── INPUTS ── */
    input,select,textarea{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:13px var(--spacing-lg);color:var(--text);font-family:var(--font-primary);font-size:var(--font-size-base);outline:none;width:100%;transition:border-color var(--transition-fast),box-shadow var(--transition-fast);box-shadow:var(--shadow-sm);}
    body.theme-neon input,body.theme-neon select,body.theme-neon textarea{background:var(--surface2);box-shadow:none;}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,.12);}
    body.theme-neon input:focus,body.theme-neon select:focus,body.theme-neon textarea:focus{box-shadow:0 0 0 3px rgba(0,245,160,.12),0 0 12px rgba(0,245,160,.08);}
    input::placeholder,textarea::placeholder{color:var(--text3);}
    input.err{border-color:var(--accent3)!important;box-shadow:0 0 0 3px rgba(239,68,68,.12)!important;}
    label{display:block;margin-bottom:var(--spacing-sm);font-size:var(--font-size-sm);color:var(--text2);font-weight:var(--font-weight-bold);}
    .field-err{color:var(--accent3);font-size:var(--font-size-xs);margin-top:var(--spacing-sm);}

    /* ── SIDEBAR ── */
    .sidebar{width:264px;min-height:100vh;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;transition:width var(--transition-normal),transform var(--transition-normal),background .3s;box-shadow:var(--shadow);overflow:hidden;}
    .sidebar.collapsed{width:68px;}
    .sidebar-logo{padding:var(--spacing-xl);border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:var(--spacing-md);min-height:76px;position:relative;}
    .sidebar.collapsed .sidebar-logo{padding:var(--spacing-md);justify-content:center;}
    .sidebar-logo-text{flex:1;overflow:hidden;transition:opacity var(--transition-normal),width var(--transition-normal);}
    .sidebar.collapsed .sidebar-logo-text{opacity:0;width:0;overflow:hidden;}
    .logo-mark{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent-mid));border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-weight:var(--font-weight-black);color:#fff;font-size:var(--font-size-xl);flex-shrink:0;box-shadow:0 4px 14px rgba(249,115,22,.35);transition:box-shadow .3s;cursor:pointer;}
    body.theme-neon .logo-mark{color:#000;box-shadow:0 0 20px rgba(0,245,160,.7);}
    body.theme-leetdark .logo-mark svg{fill:#1A1A1A;}
    .sidebar-toggle-btn{position:absolute;right:-14px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--text2);box-shadow:var(--shadow-sm);transition:all .2s;z-index:10;}
    .sidebar-toggle-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--glow);}
    body.theme-neon .sidebar-toggle-btn:hover{color:#000;}
    .sidebar-nav{flex:1;padding:var(--spacing-xl) var(--spacing-md);overflow-y:auto;overflow-x:hidden;}
    .sidebar.collapsed .sidebar-nav{padding:var(--spacing-md) var(--spacing-sm);}
    .nav-section{margin-bottom:var(--spacing-xl);}
    .nav-section-label{font-size:10px;font-weight:var(--font-weight-black);color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:0 var(--spacing-md);margin-bottom:var(--spacing-md);white-space:nowrap;transition:opacity .2s;}
    .sidebar.collapsed .nav-section-label{opacity:0;height:0;margin:0;overflow:hidden;}
    .nav-item{display:flex;align-items:center;gap:var(--spacing-md);padding:13px var(--spacing-md);border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast);color:var(--text2);font-size:var(--font-size-sm);font-weight:var(--font-weight-bold);margin-bottom:4px;border:1.5px solid transparent;white-space:nowrap;overflow:hidden;position:relative;}
    .sidebar.collapsed .nav-item{padding:13px;justify-content:center;gap:0;}
    .nav-item:hover{background:var(--surface2);color:var(--text);border-color:var(--border);}
    .nav-item.active{background:var(--accent-light);color:var(--accent);border-color:rgba(249,115,22,.25);}
    body.theme-neon .nav-item.active{background:rgba(0,245,160,.1);color:#00F5A0;border-color:rgba(0,245,160,.2);box-shadow:inset 0 0 12px rgba(0,245,160,.08);}
    .nav-item .icon{font-size:var(--font-size-lg);width:22px;text-align:center;flex-shrink:0;}
    .nav-item-label{transition:opacity .15s,width .2s;overflow:hidden;}
    .sidebar.collapsed .nav-item-label{opacity:0;width:0;}
    .nav-item .badge-count{margin-left:auto;background:var(--accent);color:#fff;border-radius:10px;padding:2px 8px;font-size:var(--font-size-xs);font-weight:var(--font-weight-black);transition:opacity .15s;}
    .sidebar.collapsed .nav-item .badge-count{opacity:0;width:0;overflow:hidden;padding:0;margin:0;}
    body.theme-neon .nav-item .badge-count{color:#000;}
    /* Collapsed tooltip on hover */
    .sidebar.collapsed .nav-item::after{content:attr(data-label);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:var(--text);color:var(--surface);font-size:11px;font-weight:700;padding:5px 10px;border-radius:8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;}
    .sidebar.collapsed .nav-item:hover::after{opacity:1;}
    .sidebar-footer{padding:20px;border-top:1.5px solid var(--border);overflow:hidden;}
    .sidebar.collapsed .sidebar-footer{padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .sidebar-user-info{flex:1;overflow:hidden;transition:opacity .15s,width .15s;}
    .sidebar.collapsed .sidebar-user-info{opacity:0;width:0;overflow:hidden;}
    .sidebar-signout-label{transition:opacity .15s;}
    .sidebar.collapsed .sidebar-signout-label{opacity:0;width:0;overflow:hidden;}

    /* ── MAIN LAYOUT ── */
    .main{margin-left:264px;min-height:100vh;background:var(--bg);transition:margin-left var(--transition-normal);}
    .main.sidebar-collapsed{margin-left:68px;}
    .topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 var(--spacing-2xl);height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;box-shadow:var(--shadow-sm);}
    .topbar-left{display:flex;align-items:center;gap:var(--spacing-lg);}
    .page-content{padding:var(--spacing-2xl);max-width:1400px;}
    /* Hamburger/collapse button in topbar */
    .topbar-menu-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--surface2);border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .2s;flex-shrink:0;}
    .topbar-menu-btn:hover{background:var(--accent-light);border-color:var(--accent);}
    .topbar-menu-btn span{display:block;width:16px;height:2px;background:var(--text2);border-radius:2px;transition:all .2s;}
    .topbar-menu-btn:hover span{background:var(--accent);}

    /* ── HERO ── */
    .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;background:var(--surface);}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(249,115,22,.1) 0%,transparent 70%);transition:background .3s;}
    body.theme-neon .hero::before{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(249,115,22,.1) 0%,transparent 70%);}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(249,115,22,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,.05) 1px,transparent 1px);background-size:48px 48px;}
    body.theme-neon .hero-grid{background-image:linear-gradient(rgba(30,45,74,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(30,45,74,.4) 1px,transparent 1px);animation:pulse 4s ease-in-out infinite;}
    .hero-content{position:relative;z-index:2;max-width:900px;padding:64px 40px;}
    .hero-tag{display:inline-flex;align-items:center;gap:10px;background:var(--accent-light);border:1.5px solid rgba(249,115,22,.3);border-radius:99px;padding:8px 22px;font-size:12px;font-weight:800;color:var(--accent);letter-spacing:1px;margin-bottom:30px;}
    body.theme-neon .hero-tag{background:rgba(0,245,160,.1);border-color:rgba(0,245,160,.25);}
    .hero h1{font-size:72px;font-weight:900;line-height:1.05;margin-bottom:26px;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 55%,var(--accent-mid) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    body.theme-neon .hero h1{background:linear-gradient(135deg,#fff 0%,#00F5A0 50%,#00C8FF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .hero p{font-size:18px;color:var(--text2);max-width:600px;margin:0 auto 42px;line-height:1.8;}
    .hero-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
    .hero-stats{display:flex;gap:54px;justify-content:center;margin-top:70px;flex-wrap:wrap;}
    .stat-item{text-align:center;}
    .stat-num{font-size:38px;font-weight:900;color:var(--accent);font-family:var(--font-secondary);}
    body.theme-neon .stat-num{text-shadow:0 0 16px rgba(0,245,160,.5);}
    .stat-label{font-size:13px;color:var(--text3);margin-top:4px;}

    /* ── SCORE RING ── */
    .score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;}
    .score-ring svg{transform:rotate(-90deg);}
    .score-ring-inner{position:absolute;text-align:center;}
    .score-ring-num{font-size:28px;font-weight:800;font-family:var(--font-secondary);color:var(--accent);}
    body.theme-neon .score-ring-num{text-shadow:0 0 16px rgba(0,245,160,.7);}
    .score-ring-label{font-size:10px;color:var(--text3);font-weight:700;}

    /* ── CHARTS ── */
    .bar-chart{display:flex;align-items:flex-end;gap:10px;height:120px;}
    .bar{flex:1;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),rgba(249,115,22,.15));transition:height .5s ease;position:relative;cursor:pointer;}
    body.theme-neon .bar{background:linear-gradient(180deg,#00F5A0,rgba(0,245,160,.15));}
    .bar:hover{filter:brightness(1.1);}

    /* ── PROBLEM ROWS ── */
    .problem-row{display:flex;align-items:center;gap:14px;padding:15px 18px;border-radius:12px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;}
    .problem-row:hover{background:var(--surface2);border-color:var(--border);}

    /* ── EDITOR ── */
    .editor-layout{display:grid;grid-template-columns:430px 1fr 350px;height:calc(100vh - 68px);overflow:hidden;}
    .editor-panel{overflow-y:auto;padding:22px;}
    .editor-panel:not(:last-child){border-right:1.5px solid var(--border);}

    /* ── NOTIFICATIONS ── */
    .notif{position:fixed;top:90px;right:28px;z-index:1000;max-width:360px;}
    .notif-item{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:17px 19px;margin-bottom:10px;animation:slideUp .3s ease;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow-lg);}
    .notif-item.success{border-left:4px solid #22C55E;}
    .notif-item.error{border-left:4px solid var(--accent3);}
    .notif-item.info{border-left:4px solid var(--accent2);}

    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;}
    body.theme-neon .modal-overlay{background:rgba(0,0,0,.78);}
    .modal{background:var(--surface);border:1.5px solid var(--border);border-radius:24px;padding:38px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease;box-shadow:var(--shadow-lg);}

    /* ── TABS ── */
    .tabs{display:flex;gap:4px;background:var(--surface2);border-radius:14px;padding:5px;margin-bottom:26px;}
    .tab{flex:1;padding:10px;border-radius:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);transition:all .2s;}
    .tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow-sm);}

    /* ── ROADMAP ── */
    .roadmap-card{padding:26px;cursor:pointer;}
    .roadmap-card-icon{font-size:36px;margin-bottom:14px;}
    .roadmap-card-title{font-size:16px;font-weight:800;margin-bottom:6px;}
    .roadmap-card-desc{font-size:12px;color:var(--text2);margin-bottom:14px;}

    /* ── ADVANCED ROADMAP ── */
    .rm-hero{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:28px;position:relative;overflow:hidden;}
    .rm-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(249,115,22,.07),transparent 70%);}
    body.theme-neon .rm-hero::before{background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(0,245,160,.07),transparent 70%);}
    .rm-stat-row{display:flex;gap:20px;flex-wrap:wrap;}
    .rm-stat{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:14px 18px;flex:1;min-width:120px;text-align:center;}
    .rm-stat-num{font-size:22px;font-weight:800;font-family:var(--font-secondary);color:var(--accent);margin-bottom:2px;}
    .rm-stat-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
    .rm-track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-bottom:28px;}
    .rm-track{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .25s;position:relative;}
    .rm-track:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
    .rm-track-header{padding:20px 22px 16px;border-bottom:1.5px solid var(--border);}
    .rm-track-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
    .rm-track-body{padding:16px 22px 20px;}
    .rm-topic-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:8px;margin:0 -4px;padding-left:4px;padding-right:4px;}
    .rm-topic-row:last-child{border-bottom:none;}
    .rm-topic-row:hover{background:var(--surface2);}
    .rm-topic-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer;}
    .rm-topic-check.done{border-color:transparent;}
    .rm-topic-meta{display:flex;align-items:center;gap:6px;margin-top:2px;}
    .rm-diff{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;}
    .rm-diff-easy{background:rgba(74,222,128,.15);color:#16a34a;border:1px solid rgba(74,222,128,.3);}
    body.theme-neon .rm-diff-easy{background:rgba(0,245,160,.12);color:#00F5A0;border-color:rgba(0,245,160,.2);}
    .rm-diff-med{background:rgba(251,191,36,.15);color:#b45309;border:1px solid rgba(251,191,36,.3);}
    body.theme-neon .rm-diff-med{background:rgba(255,217,61,.12);color:#FFD93D;border-color:rgba(255,217,61,.2);}
    .rm-diff-hard{background:rgba(248,113,113,.15);color:#dc2626;border:1px solid rgba(248,113,113,.3);}
    body.theme-neon .rm-diff-hard{background:rgba(255,107,107,.12);color:#FF6B6B;border-color:rgba(255,107,107,.2);}
    .rm-xp{font-size:9px;font-weight:800;color:var(--accent4);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.2);padding:2px 7px;border-radius:10px;}
    body.theme-neon .rm-xp{color:#FFD93D;background:rgba(255,217,61,.1);border-color:rgba(255,217,61,.2);}
    .rm-time{font-size:9px;color:var(--text3);font-weight:600;}
    @keyframes rmCheckPop{0%{transform:scale(0.5);}70%{transform:scale(1.3);}100%{transform:scale(1);}}
    .rm-check-anim{animation:rmCheckPop .25s ease forwards;}
    .rm-path-connector{display:flex;align-items:center;justify-content:center;height:32px;position:relative;}
    .rm-path-connector::before{content:'';position:absolute;width:2px;height:100%;background:linear-gradient(180deg,var(--accent),var(--border));opacity:.3;}
    .rm-path-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:relative;z-index:1;animation:pulse 2s infinite;}
    .rm-detail-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;}
    .rm-detail-topbar{background:linear-gradient(135deg,var(--surface2),var(--surface));border-bottom:1.5px solid var(--border);padding:20px 24px;}
    .rm-resource-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--surface2);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;text-decoration:none;color:var(--text2);}
    .rm-resource-chip:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(59,130,246,.05);}
    .rm-locked{opacity:.45;pointer-events:none;}
    .rm-locked-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--text3);background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:3px 10px;margin-left:auto;}
    .rm-progress-ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
    @keyframes rmRingFill{from{stroke-dashoffset:var(--start);}to{stroke-dashoffset:var(--end);}}

    /* ── COURSES ── */
    .course-card{overflow:hidden;}
    .course-thumb{height:150px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:52px;margin-bottom:18px;background:var(--surface2);}

    /* ── INTERVIEWS / JOBS ── */
    .interview-slot{padding:20px;cursor:pointer;display:flex;gap:18px;align-items:center;}
    .job-card{padding:22px;}
    .company-logo{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;}

    /* ── TOOLTIP ── */
    .tooltip-wrap{position:relative;display:inline-block;}
    .tooltip{position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:var(--text);border-radius:8px;padding:6px 12px;font-size:11px;white-space:nowrap;color:#fff;pointer-events:none;opacity:0;transition:opacity .2s;z-index:200;}
    body.theme-neon .tooltip{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
    .tooltip-wrap:hover .tooltip{opacity:1;}

    /* ── AI CHAT ── */
    .ai-message{padding:14px 18px;border-radius:16px;margin-bottom:10px;max-width:85%;font-size:13px;line-height:1.75;}
    .ai-message.bot{background:var(--surface2);border:1.5px solid var(--border);margin-right:auto;border-radius:4px 16px 16px 16px;}
    .ai-message.user{background:var(--accent-light);border:1.5px solid rgba(249,115,22,.25);margin-left:auto;border-radius:16px 4px 16px 16px;}
    body.theme-neon .ai-message.user{background:rgba(0,245,160,.1);border-color:rgba(0,245,160,.2);}
    .typing-dot{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;margin:0 2px;animation:typing 1.2s infinite;}
    .typing-dot:nth-child(2){animation-delay:.2s;}
    .typing-dot:nth-child(3){animation-delay:.4s;}

    .hscroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;}
    .hscroll::-webkit-scrollbar{height:4px;}

    /* ── GRIDS ── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
    @media(max-width:900px){.grid-4,.grid-3{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}.editor-layout{grid-template-columns:1fr;}.sidebar{transform:translateX(-100%);}.main{margin-left:0;}}

    /* ── FEATURE CARDS ── */
    .feature-card{padding:36px;border-radius:20px;background:var(--surface);border:1.5px solid var(--border);transition:all .3s;box-shadow:var(--shadow-sm);}
    .feature-card:hover{transform:translateY(-5px);border-color:rgba(249,115,22,.3);box-shadow:0 16px 48px rgba(249,115,22,.12);}
    body.theme-neon .feature-card:hover{border-color:rgba(0,245,160,.3);box-shadow:0 12px 40px rgba(0,0,0,.5);}
    body.theme-linkedin .feature-card:hover{border-color:rgba(10,102,194,.25);box-shadow:0 12px 32px rgba(10,102,194,.1);}
    body.theme-leetdark .feature-card:hover{border-color:rgba(255,161,22,.25);box-shadow:0 12px 32px rgba(0,0,0,.4);}
    .feature-icon{width:56px;height:56px;border-radius:14px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--accent);}
    body.theme-neon .feature-icon{background:rgba(0,245,160,.1);color:#00F5A0;}
    body.theme-linkedin .feature-icon{background:var(--accent-light);color:var(--accent);}
    body.theme-leetdark .feature-icon{background:rgba(255,161,22,.12);color:var(--accent);}
    .feature-title{font-size:18px;font-weight:800;margin-bottom:10px;}
    .feature-desc{font-size:14px;color:var(--text2);line-height:1.7;}

    /* ── PRICING ── */
    .price-card{padding:36px;border-radius:20px;background:var(--surface);border:1.5px solid var(--border);text-align:center;box-shadow:var(--shadow-sm);}
    .price-card.featured{border-color:var(--accent);box-shadow:0 0 40px rgba(249,115,22,.15);}

    const {useState, useEffect, useRef, useCallback, createContext, useContext} = React;

    const switchTheme = (theme) => {
      // Remove all theme classes
      document.body.classList.remove('theme-neon','theme-professional','theme-minimal','theme-linkedin','theme-leetdark');
      if(theme !== 'default') document.body.classList.add('theme-'+theme);
      // Update active button
      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      const btn = document.querySelector('[data-theme="'+theme+'"]');
      if(btn) btn.classList.add('active');
      localStorage.setItem('vibe-theme', theme);
    };

    window.addEventListener('load', () => {
      const savedTheme = localStorage.getItem('vibe-theme') || 'default';

    // ═══════════════════════════════════════════════════════════

    const hashPassword = (pw) => {
    let h = 0x811c9dc5;
    for (let i = 0; i < pw.length; i++) { h ^= pw.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
    return h.toString(16).padStart(8,'0') + btoa(pw.split('').reverse().join('')).slice(0,16);
    };

    const makeToken = (uid, email, role) => {
    const header = btoa(JSON.stringify({alg:'HS256',typ:'JWT'}));
    const payload = btoa(JSON.stringify({uid,email,role,iat:Date.now(),exp:Date.now()+86400000*7}));
    const sig = btoa(uid+email+role+'vibe_secret').slice(0,16);
    return `${header}.${payload}.${sig}`;
    };

    const parseToken = (token) => {
    try { const [,p]=token.split('.'); const d=JSON.parse(atob(p)); if(d.exp<Date.now()) return null; return d; } catch{return null;}
    };

    const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

    async function callClaudeStream(messages,systemPrompt = '', maxTokens = 1000, onChunk) {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
        "Content-Type": "application/json",
        "anthropic-version": "2023-06-01",
        },
        body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: messages,
        stream: true,
        })
    });
    if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
    }
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');
        for (const line of lines) {
        if (line.startsWith('data: ')) {
            try {
            const json = JSON.parse(line.slice(6));
            if (json.type === 'content_block_delta' && json.delta?.text) {
                full += json.delta.text;
                onChunk(full);
            }
            } catch {}
        }
        }
    }
    return full;
    }

            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:'stroke-dashoffset .8s ease'}}/>

        <div className="score-ring-inner">
            <div className="score-ring-num" style={{fontSize:size*.22,color}}>{score}</div>
            <div className="score-ring-label" style={{fontSize:size*.09}}>SCORE</div>
        </div>

    );

        DB.saveUser(uid, userData);
        DB.setToken(makeToken(uid, f.email, role));
        setLoading(false);
        onSuccess(userData);
        } else {

        if(!found){ setErrs({email:'No account found with this email.'}); setLoading(false); doShake(); return; }
        if(found.passwordHash !== hashPassword(f.password)){ setErrs({password:'Incorrect password. Try again.'}); setLoading(false); doShake(); return; }

    // ─── PROBLEMS PAGE ────────────────────────────────────────────────────────────
    function ProblemsPage({user, setPage, setActiveProblem}) {
    const [filter,setFilter]=useState('all');
    const [search,setSearch]=useState('');
    const [diff,setDiff]=useState('all');

    const filtered=PROBLEMS.filter(p=>{
        if(search && !p.title.toLowerCase().includes(search.toLowerCase())) return false;
        if(diff!=='all' && p.difficulty!==diff) return false;
        if(filter==='solved' && !p.solved) return false;
        if(filter==='unsolved' && p.solved) return false;
        return true;
    });

    const stats={total:PROBLEMS.length,solved:PROBLEMS.filter(p=>p.solved).length};
    return (
        <div className="page-content fade-in">
        <div className="grid-4" style={{marginBottom:24}}>
            {[
            {label:'Total Solved',val:`${stats.solved}/${stats.total}`,color:'var(--accent)'},
            {label:'Easy',val:`${PROBLEMS.filter(p=>p.difficulty==='Easy'&&p.solved).length}/${PROBLEMS.filter(p=>p.difficulty==='Easy').length}`,color:'#4ADE80'},
            {label:'Medium',val:`${PROBLEMS.filter(p=>p.difficulty==='Medium'&&p.solved).length}/${PROBLEMS.filter(p=>p.difficulty==='Medium').length}`,color:'var(--accent4)'},
            {label:'Hard',val:`${PROBLEMS.filter(p=>p.difficulty==='Hard'&&p.solved).length}/${PROBLEMS.filter(p=>p.difficulty==='Hard').length}`,color:'var(--accent3)'},
            ].map(s=>(
            <div key={s.label} className="card" style={{padding:16,textAlign:'center'}}>
                <div style={{fontSize:24,fontWeight:800,color:s.color,fontFamily:'Poppins'}}>{s.val}</div>
                <div style={{fontSize:12,color:'var(--text2)',marginTop:4}}>{s.label}</div>
            </div>
            ))}
        </div>

        <div style={{display:'flex',gap:16,marginBottom:24,flexWrap:'wrap'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search problems..." style={{flex:1,minWidth:200}}/>
            <select value={diff} onChange={e=>setDiff(e.target.value)} style={{width:130}}>
            <option value="all">All Levels</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
            </select>
            <div style={{display:'flex',gap:4}}>
            {['all','solved','unsolved'].map(f=>(
                <button key={f} className={`btn btn-sm ${filter===f?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
            ))}
            </div>
        </div>

        <div className="card" style={{overflow:'hidden'}}>
            <div style={{display:'grid',gridTemplateColumns:'40px 1fr 100px 100px 80px 80px',gap:16,padding:'15px 20px',borderBottom:'1.5px solid var(--border)',fontSize:11,color:'var(--text3)',fontWeight:700,letterSpacing:1,textTransform:'uppercase'}}>

    // ─── RESUME BUILDER (with real AI ATS) ───────────────────────────────────────
    function ResumePage({user, addNotif}) {
    const [resumeData,setResumeData]=useState({
        name:user.name, title:'Full Stack Developer | DSA Enthusiast',
        email:user.email||'', phone:'+91 98765 43210', location:'Bangalore, India',
        linkedin:'linkedin.com/in/arjun', github:'github.com/arjun',
        summary:'Passionate full-stack developer with 2 years of experience building scalable web applications. Strong DSA fundamentals with 200+ LeetCode problems solved.',
        experience:[{company:'TechStartup Pvt Ltd',role:'SDE Intern',duration:'June 2025 - Dec 2025',points:['Built REST APIs with Node.js & Express serving 10K+ daily users','Reduced DB query time by 40% using MongoDB aggregation pipelines','Implemented JWT auth system with role-based access control']}],
        projects:[
        {name:'E-commerce Platform',tech:'React, Node.js, MongoDB',desc:'Full-stack e-commerce with 50+ products, cart, payments via Razorpay'},
        {name:'DSA Visualizer',tech:'JavaScript, D3.js',desc:'Interactive algorithm visualization tool with 20+ algorithms'},
        ],
        education:{college:'VIT University',degree:'B.Tech Computer Science',year:'2022-2026',cgpa:'8.6'},
        skills:['C/C++','JavaScript','Python','React.js','Node.js','MongoDB','Git','DSA'],
    });
    const [atsScore,setAtsScore]=useState(null);
    const [analyzing,setAnalyzing]=useState(false);
    const [activeSection,setActiveSection]=useState('basic');

    const analyzeATS=async()=>{
        setAnalyzing(true); setAtsScore(null);
        try {
        const resumeText=`
    Name: ${resumeData.name}
    Title: ${resumeData.title}
    Summary: ${resumeData.summary}
    Experience: ${resumeData.experience.map(e=>`${e.role} at ${e.company}: ${e.points.join(', ')}`).join('\n')}
    Projects: ${resumeData.projects.map(p=>`${p.name} (${p.tech}): ${p.desc}`).join('\n')}
    Education: ${resumeData.education.degree} from ${resumeData.education.college}, CGPA: ${resumeData.education.cgpa}
    Skills: ${resumeData.skills.join(', ')}
        `.trim();

        const systemPrompt=`You are an expert ATS (Applicant Tracking System) and resume analyst. Analyze resumes for Indian software engineering job market. Be specific and actionable.`;
        const prompt=`Analyze this resume for ATS optimization and overall quality for software engineering roles in India.

    RESUME:
    ${resumeText}

    Return ONLY this exact JSON (no markdown, no extra text):
    {
    "score": <overall ATS score 0-100>,
    "breakdown": {
        "keywords": <0-100>,
        "formatting": <0-100>,
        "sections": <0-100>,
        "quantification": <0-100>,
        "length": <0-100>
    },
    "strengths": ["<strength1>", "<strength2>", "<strength3>"],
    "suggestions": ["<specific actionable suggestion1>", "<suggestion2>", "<suggestion3>", "<suggestion4>", "<suggestion5>"],
    "missingKeywords": ["<keyword1>", "<keyword2>", "<keyword3>"],
    "summary": "<2 sentence overall assessment>"
    }`;

        const result=await callClaude([{role:'user',content:prompt}],systemPrompt,800);
        const jsonMatch=result.match(/\{[\s\S]*\}/);
        if(jsonMatch){

    const MOCK_PROBLEMS = [
      {id:1,title:'Two Sum',diff:'Easy',
       desc:'Given an array of numbers and a target, return indices of the two numbers that add up to the target.',
       starter:'function twoSum(nums, target) {\n  // Your solution here\n  \n}\n\n// Tests:\nconsole.log(JSON.stringify(twoSum([2,7,11,15], 9)));  // [0,1]\nconsole.log(JSON.stringify(twoSum([3,2,4], 6)));       // [1,2]',
       tests:[{expr:'JSON.stringify(twoSum([2,7,11,15],9))',want:'"[0,1]"'},{expr:'JSON.stringify(twoSum([3,2,4],6))',want:'"[1,2]"'}]},
      {id:2,title:'Sum of Digits',diff:'Easy',

       tests:[{expr:'sumOfDigits(123)',want:'6'},{expr:'sumOfDigits(9999)',want:'36'}]},

       starter:'function fibonacci(n) {\n  // Your solution here\n  \n}\n\nconsole.log(fibonacci(5));   // 5\nconsole.log(fibonacci(10));  // 55',
       tests:[{expr:'fibonacci(5)',want:'5'},{expr:'fibonacci(10)',want:'55'}]},
    ];
    const MOCK_IQ = [
      'Tell me about yourself and your programming experience.',
      'Describe a challenging technical problem you solved. What was your approach?',
      'CODING: A coding challenge is now loaded in the editor. Explain your thinking as you go, then click Run when ready.',
    ];

    function MockInterviewTab({user, addNotif}) {
      const [callActive, setCallActive] = useState(false);
      const [camStream, setCamStream]   = useState(null);
      const [micOn, setMicOn]           = useState(true);
      const [camOn, setCamOn]           = useState(true);
      const [callSec, setCallSec]       = useState(0);
      const callRef   = useRef(null);
      const vidRef    = useRef(null);
      const canvasRef = useRef(null);
      const animRef   = useRef(null);

      const [started, setStarted]       = useState(false);
      const [qIdx, setQIdx]             = useState(0);
      const [msgs, setMsgs]             = useState([
        {from:'bot', text:'Hi! I am Alex, your AI interviewer. Click Start Call on the left to open the video session, then press Start Interview. Good luck!'}
      ]);
      const [ans, setAns]               = useState('');
      const [done, setDone]             = useState(false);
      const [scores, setScores]         = useState(null);
      const [showProb, setShowProb]     = useState(false);
      const [prob, setProb]             = useState(MOCK_PROBLEMS[0]);

      const [code, setCode]             = useState(MOCK_PROBLEMS[0].starter);
      const [outLines, setOutLines]     = useState([{t:'// Run your code to see output here',c:'ogray'}]);
      const [outOpen, setOutOpen]       = useState(true);
      const [running, setRunning]       = useState(false);
      const [outBadge, setOutBadge]     = useState('');

      const [voiceOn, setVoiceOn]       = useState(false);
      const [interim, setInterim]       = useState('');
      const recRef = useRef(null);
      const chatBot = useRef(null);

      const lineNums = code.split('\n').map((_,i)=>i+1).join('\n');

      useEffect(()=>{ chatBot.current && chatBot.current.scrollIntoView({behavior:'smooth'}); },[msgs]);

      // ── call ──────────────────────────────────────────────────────
      const startCall = async () => {
        try {
          const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
          setCamStream(s);
          if(vidRef.current){ vidRef.current.srcObject=s; vidRef.current.play().catch(()=>{}); }
        } catch(_) {
          addNotif({type:'info', msg:'Camera unavailable - using avatar mode', time:'now'});
        }
        setCallActive(true); setCallSec(0);
        callRef.current = setInterval(()=>setCallSec(c=>c+1), 1000);
        setTimeout(()=>{ if(canvasRef.current) animateAI(canvasRef.current); }, 80);
        addNotif({type:'success', msg:'Call started! Alex has joined.', time:'now'});
      };

      const endCall = () => {
        camStream && camStream.getTracks().forEach(t=>t.stop());
        setCamStream(null); clearInterval(callRef.current);
        cancelAnimationFrame(animRef.current);
        setCallActive(false); setCallSec(0);
      };

      const toggleMic = () => {
        if(!camStream) return;
        const v = !micOn; setMicOn(v);
        camStream.getAudioTracks().forEach(t=>t.enabled=v);
      };
      const toggleCam = () => {
        if(!camStream) return;
        const v = !camOn; setCamOn(v);
        camStream.getVideoTracks().forEach(t=>t.enabled=v);
        if(vidRef.current) vidRef.current.style.opacity = v ? '1' : '0.15';
      };

      const fmtT = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');

      const animateAI = (cv) => {
        const ctx = cv.getContext('2d');
        let f = 0;
        const loop = () => {
          const w=cv.offsetWidth||220, h=cv.offsetHeight||175;
          cv.width=w; cv.height=h;
          ctx.fillStyle='#0A1428'; ctx.fillRect(0,0,w,h);
          const cx=w/2, cy=h*0.42, r=Math.min(w,h)*0.2, p=1+0.04*Math.sin(f*0.05);
          const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*p*1.6);
          g.addColorStop(0,'rgba(0,245,160,.3)'); g.addColorStop(.5,'rgba(0,200,255,.15)'); g.addColorStop(1,'transparent');
          ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r*p*1.6,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='#0D1D38'; ctx.strokeStyle='rgba(0,245,160,'+(0.5+0.3*Math.sin(f*.03))+')'; ctx.lineWidth=2;
          ctx.beginPath(); ctx.arc(cx,cy,r*p,0,Math.PI*2); ctx.fill(); ctx.stroke();
          ctx.font=(r*.9)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('\uD83E\uDD16',cx,cy);
          const wy=cy+r*p+12; ctx.lineWidth=1.5;
          for(let i=0;i<3;i++){
            ctx.strokeStyle='rgba(0,245,160,'+(0.45-i*.1)+')'; ctx.beginPath();
            const ww=28+i*11;
            for(let x=cx-ww;x<=cx+ww;x++){ const y=wy+i*8+(3+i*2)*Math.sin(x*.2+f*.15+i*1.2); x===Math.ceil(cx-ww)?ctx.moveTo(x,y):ctx.lineTo(x,y); }
            ctx.stroke();
          }
          ctx.fillStyle='rgba(139,163,188,.7)'; ctx.font='bold 10px sans-serif'; ctx.textBaseline='bottom';
          ctx.fillText('Alex - AI Interviewer', w/2, h-7);
          f++; animRef.current=requestAnimationFrame(loop);
        };
        loop();
      };

      // ── interview ─────────────────────────────────────────────────
      const addMsg = (from, text) => setMsgs(m=>[...m,{from,text}]);

      const startInterview = () => {
        setStarted(true); setQIdx(0); setDone(false); setScores(null);
        setTimeout(()=>askQ(0), 300);
      };

      const askQ = (idx) => {
        const q = MOCK_IQ[idx];
        setMsgs(m=>[...m,{from:'typing',text:''}]);
        setTimeout(()=>{
          setMsgs(m=>m.filter(x=>x.from!=='typing'));
          addMsg('bot','Q'+(idx+1)+': '+q);
          if(idx===2){
            setProb(MOCK_PROBLEMS[0]);
            setCode(MOCK_PROBLEMS[0].starter);
            setShowProb(true);
            setOutLines([{t:'// Problem loaded - write your solution and click Run',c:'ogray'}]);
            addNotif({type:'info', msg:'Coding problem loaded in editor!', time:'now'});
          }
        }, 1100);
      };

      const submitAns = () => {
        const t = ans.trim(); if(!t) return;
        addMsg('user', t); setAns(''); stopVoice();
        const next = qIdx+1; setQIdx(next);
        if(next >= MOCK_IQ.length){
          setTimeout(()=>{
            addMsg('bot','Great work! All questions answered. Calculating your score...');
            setTimeout(()=>{
              const s={Communication:Math.floor(68+Math.random()*28),Technical:Math.floor(65+Math.random()*30),CodingStyle:Math.floor(60+Math.random()*35)};
              s.Overall=Math.floor((s.Communication+s.Technical+s.CodingStyle)/3);
              setScores(s); setDone(true); setStarted(false);
            },1500);
          },600);
        } else {
          setTimeout(()=>askQ(next), 700);
        }
      };

      const resetSession = () => {
        setStarted(false); setQIdx(0); setDone(false); setScores(null);
        setAns(''); setShowProb(false); setCode(MOCK_PROBLEMS[0].starter);
        setOutLines([{t:'// Output will appear here',c:'ogray'}]); setOutBadge('');
        setMsgs([{from:'bot',text:'Session reset! Click Start Interview to begin again.'}]);
      };

      // ── code runner ───────────────────────────────────────────────
      const runCode = () => {
        if(!code.trim()){addNotif({type:'error',msg:'Write some code first!',time:'now'});return;}
        setRunning(true); setOutLines([{t:'Running...', c:'ogray'}]); setOutBadge('');
        setTimeout(()=>{
          const logs=[];
          try {
            const fc={
              log:(...a)=>logs.push({t:a.map(x=>{try{return JSON.stringify(x);}catch(_){return String(x);}}). join(' '),c:''}),
              error:(...a)=>logs.push({t:a.map(x=>String(x)).join(' '),c:'ored'}),
              warn:(...a)=>logs.push({t:a.map(x=>String(x)).join(' '),c:'oyellow'}),
            };
            new Function('console', code)(fc);
            const out = logs.length ? logs : [{t:'Code ran OK (no console output)',c:'ogreen'}];
            setOutLines(out); setOutBadge('ok');
          } catch(e){
            setOutLines([{t:'Error: '+e.message,c:'ored'}]); setOutBadge('err');
          }
          runTests(); setRunning(false);
        }, 350);
      };

      const runTests = () => {
        const tests = prob.tests; if(!tests||!tests.length) return;
        let passed=0;
        const extra=[{t:'--- Test Cases ---',c:'ogray'}];
        tests.forEach(tc=>{
          try {
            const fn=new Function('console', code+'\nreturn '+tc.expr+';');
            const res=String(fn({log:()=>{},error:()=>{},warn:()=>{}}));
            const ok=res===tc.want; if(ok)passed++;
            extra.push({t:(ok?'PASS':'FAIL')+': '+tc.expr+' = '+res+' (want '+tc.want+')',c:ok?'ogreen':'ored'});
          } catch(e){ extra.push({t:'ERROR: '+tc.expr+' => '+e.message,c:'ored'}); }
        });
        extra.push({t:passed+'/'+tests.length+' tests passed',c:passed===tests.length?'ogreen':'oyellow'});
        setOutLines(l=>[...l,...extra]);
        if(passed===tests.length){
          addNotif({type:'success',msg:'All tests passed!',time:'now'});
          addMsg('bot','All test cases passed! Great solution. Can you explain its time complexity?');
        }
      };

      const handleKey = (e) => {
        if(e.key==='Tab'){
          e.preventDefault();
          const s=e.target.selectionStart;
          const v=code.slice(0,s)+'  '+code.slice(e.target.selectionEnd);
          setCode(v);
          setTimeout(()=>{ e.target.selectionStart=e.target.selectionEnd=s+2; },0);
        }
      };

      // ── voice ──────────────────────────────────────────────────────
      const startVoice = () => {
        const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
        if(!SR){addNotif({type:'error',msg:'Voice not supported - use Chrome',time:'now'});return;}
        if(!recRef.current){
          const r=new SR(); r.continuous=true; r.interimResults=true; r.lang='en-IN';
          r.onresult=(ev)=>{
            let fin='',int='';
            for(let i=ev.resultIndex;i<ev.results.length;i++){
              const t=ev.results[i][0].transcript;
              ev.results[i].isFinal?fin+=t:int+=t;
            }
            if(fin) setAns(a=>(a+' '+fin).trim());
            setInterim(int);
          };
          r.onerror=()=>stopVoice();
          r.onend=()=>{ if(voiceOn){ try{r.start();}catch(_){stopVoice();} } };
          recRef.current=r;
        }
        try{recRef.current.start();}catch(_){}
        setVoiceOn(true);
      };
      const stopVoice = () => {
        if(recRef.current){try{recRef.current.stop();}catch(_){}}
        setVoiceOn(false); setInterim('');
      };
      const toggleVoice = () => {

        voiceOn?stopVoice():startVoice();

                  <div className="vtile-lbl">You — {user&&user.name?user.name:'Student'}</div>

                {/* AI */}
                <div className="vtile">
                  {callActive
                    ? <canvas ref={canvasRef}/>

                  <div className="vtile-lbl">Alex — AI Interviewer</div>
